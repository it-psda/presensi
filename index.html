    <!-- Firebase SDK Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7DfBiDFB3P3as40f1__ZglPNffg_Pcdw",
            authDomain: "sim-pusda-master.firebaseapp.com",
            projectId: "sim-pusda-master",
            storageBucket: "sim-pusda-master.firebasestorage.app",
            messagingSenderId: "606502874855",
            appId: "1:606502874855:web:1b53b4f69f21049e7cbc42",
            measurementId: "G-0BPH99F48P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.loadFromFirebase = async () => {
            try {
                if (!auth.currentUser) await signInAnonymously(auth);
                const docRef = doc(db, 'artifacts', 'sim-pusda-wsbb', 'public', 'data', 'dashboard_cache');
                const docSnap = await getDoc(docRef);
                return docSnap.exists() ? docSnap.data() : null;
            } catch (e) { return null; }
        };

        window.saveToFirebase = async (data) => {
            try {
                const docRef = doc(db, 'artifacts', 'sim-pusda-wsbb', 'public', 'data', 'dashboard_cache');
                await setDoc(docRef, { ...data, lastSync: new Date().toISOString() });
            } catch (e) { }
        };

        window.dispatchEvent(new Event('firebaseReady'));
    </script>
    
    <style>
        /**
         * SIM UPT PUSDA - Dashboard Stylesheet v7.8 (Compact Pro)
         * Solusi: Reduced Hero Height, Precision 60/40, & Hybrid Sync Stability.
         */
        :root {
            --primary: #1e3a8a; --primary-light: #3b82f6;
            --accent: #f97316; --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --success: #10b981; --toska: #06b6d4; --danger: #ef4444;
            --bg-body: #0f172a; --bg-gradient: radial-gradient(circle at top right, #1e40af, #0f172a 60%);
            --text-main: #f8fafc; --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(15px); --card-shadow: 0 20px 50px rgba(0,0,0,0.4);
            --sidebar-width: 280px;
        }

        body.light-theme {
            --bg-body: #f8fafc; --bg-gradient: radial-gradient(circle at top right, #dbeafe, #f8fafc 70%);
            --text-main: #1e293b; --text-muted: #475569;
            --glass: rgba(255, 255, 255, 0.85); --glass-border: rgba(0, 0, 0, 0.1);
            --card-shadow: 0 15px 35px rgba(30, 41, 59, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); overflow-x: hidden; display: flex; min-height: 100vh; transition: 0.3s; }
        .fixed-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg-gradient); }

        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: skeletonPulse 1.5s infinite linear; }
        @keyframes skeletonPulse { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        .theme-toggle-mobile, #master-bottom-nav, .sub-modal { display: none !important; }
        .sub-modal.show { display: flex !important; }

        #master-sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px 25px; display: flex; flex-direction: column; z-index: 1000; box-shadow: var(--card-shadow); }
        body.light-theme #master-sidebar { background: rgba(255,255,255,0.95); }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .brand img { height: 45px; object-fit: contain; }
        .brand h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.5px; }
        .logo-sim { color: var(--accent); } .logo-pu { color: var(--primary-light); } .logo-sda { color: var(--toska); }

        .nav-link { padding: 15px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 600; cursor: pointer; }
        .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); }

        .sidebar-footer { margin-top: auto; padding: 5px; }
        #clockSidebar { font-size: 1.6rem; font-weight: 900; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; text-align: center; }
        .theme-btn-sidebar { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-main); font-weight: 800; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        #master-main-dashboard { flex: 1; margin-left: calc(var(--sidebar-width) + 40px); padding: 40px 2.5rem 120px 2.5rem; min-height: 100vh; position: relative; }
        .master-title-container { display: flex; align-items: center; gap: 18px; margin-bottom: 30px; }
        .master-accent-bar { width: 7px; height: 40px; background: var(--accent-gradient); border-radius: 4px; }
        .master-title-text { font-size: clamp(1.5rem, 4vw, 2.1rem); font-weight: 900; color: var(--text-main); letter-spacing: -1px; text-transform: uppercase; }

        /* --- HERO SECTION (COMPACT 60/40) --- */
        .hero-section { 
            position: relative; background: var(--glass); backdrop-filter: var(--glass-blur); 
            border: 1px solid var(--glass-border); border-radius: 35px; padding: 30px 45px; 
            margin-bottom: 35px; display: flex; align-items: center; justify-content: space-between; 
            gap: 20px; box-shadow: var(--card-shadow); min-height: 320px; 
        }
        
        /* 60% Teks di Kiri */
        .hero-text { 
            flex: 0 0 60%; 
            order: 1; 
            text-align: left;
        }
        
        /* 40% Foto di Kanan */
        .hero-image-container { 
            flex: 0 0 40%; position: relative; display: flex; 
            align-items: flex-end; justify-content: center; min-height: 320px; 
            order: 2; 
        }
        
        /* Ukuran Kotak Foto Diperkecil (Compact) */
        .hero-img-box { 
            position: relative; width: 125px; height: 170px; 
            background: rgba(255,255,255,0.08); border: 1.5px solid var(--glass-border); 
            border-radius: 26px; display: flex; align-items: flex-end; justify-content: center; 
            overflow: visible;

        .hero-img { 
            width: 170%; height: auto; object-fit: contain; transform-origin: bottom center; 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5)); margin-bottom: -4px; 
            opacity: 0; transition: opacity 0.5s ease;

        /* Label Nama Kompak */
        #heroLabel { 
            position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); 
            width: max-content; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); 
            padding: 8px 18px; border: 1px solid var(--glass-border); border-radius: 18px; 
            text-align: center; z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            opacity: 0; transition: 0.5s; 
        }

        .hero-text h2 { font-size: clamp(1.3rem, 3.5vw, 1.8rem); line-height: 1.2; }
        .hero-text p { font-size: 0.85rem; margin-top: 10px; }

        .search-wrapper { position: relative; flex: 1; display: flex; align-items: center; margin-bottom: 25px; }
        .search-wrapper input { width: 100%; height: 55px; padding: 0 60px 0 25px; border-radius: 20px; background: rgba(0,0,0,0.3) !important; border: 1.5px solid var(--glass-border); color: white; font-weight: 700; outline: none; transition: 0.3s; font-size: 0.95rem; }
        body.light-theme .search-wrapper input { background: white !important; color: #1e293b; border-color: #cbd5e1; }
        .mic-btn-search { position: absolute; right: 10px; width: 42px; height: 42px; border-radius: 12px; background: var(--accent-gradient); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 20px; }
        .tool-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 26px; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px; cursor: pointer; transition: 0.3s; box-shadow: var(--card-shadow); }
        .tool-icon { width: 62px; height: 62px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; background: var(--accent-gradient); font-size: 26px; }

        /* MODAL */
        .sub-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(25px); z-index: 5000; align-items: center; justify-content: center; padding: 20px; display: none; }
        .sub-modal-card { background: var(--bg-body); border: 1px solid var(--glass-border); width: 100%; max-width: 550px; border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; max-height: 85vh; }
        .modal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 25px; }
        .modal-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; cursor: pointer; transition: 0.3s; }

        @media (max-width: 1024px) {
            #master-sidebar { display: none; }
            #master-main-dashboard { margin-left: 0; padding: 25px 0.5rem 140px 0.5rem; width: 100%; }
            .theme-toggle-mobile { display: flex !important; position: fixed; top: 20px; right: 20px; width: 52px; height: 52px; background: rgba(15, 23, 42, 0.85); border-radius: 16px; z-index: 1001; align-items: center; justify-content: center; cursor: pointer; color: white; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
            #master-bottom-nav { display: flex !important; position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; background: rgba(15, 23, 42, 0.95); border-radius: 22px; justify-content: space-around; align-items: center; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); }
            .b-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 800; gap: 5px; }
            .b-nav-item.active { color: var(--accent); }
            .presensi-fab { background: var(--accent-gradient); width: 55px; height: 55px; border-radius: 18px; margin-top: -40px; border: 5px solid var(--bg-body); display: flex; align-items: center; justify-content: center; color: white; }
            
            /* Mobile: Tetap Tumpuk Teks atas, Foto bawah (representasi Kiri/Kanan) */
            .hero-section { flex-direction: column; padding: 35px 20px; min-height: auto; margin-top: 20px; text-align: center; }
            .hero-text { flex: none; width: 100%; order: 1; margin-bottom: 25px; }
            .hero-image-container { flex: none; width: 100%; order: 2; min-height: 250px; }
            
            .hero-img-box { width: 110px; height: 150px; }
            .hero-img { width: 160%; }

            .tools-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-grid { grid-template-columns: 1fr; }
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF7MP60nTfLmnA7_GhUedzAl58I51kfJmk_xePBhgVxVHaLtce51aBfCuSskPP67ym/exec";
        const FALLBACK_LOGO = "https://lh3.googleusercontent.com/d/1VYrfN1EG20Enf74vSyw1dGdskFujX8_r";
        window.appData = { config: {}, pegawai: [], korlap: [], presensi: [], tools: [], isLoaded: false };

        window.onload = async () => {
            initTheme(); initClock();
            window.addEventListener('firebaseReady', async () => {
                if (window.loadFromFirebase) {
                    const fbData = await window.loadFromFirebase();
                    if (fbData && !window.appData.isLoaded) {
                        window.appData = fbData; window.appData.isLoaded = true;
                        applyGlobalUI(); renderDashboardTools(); startHeroSlider();
                        document.getElementById('heroDescription').innerText = "Akses Informasi Otoritas Aktif & Terakselerasi.";
                    }
                }
            });
            fetchWithRetry();
        };

        async function fetchWithRetry(retries = 3, delay = 3000) {
            const ctrl = new AbortController();
            const timeout = setTimeout(() => ctrl.abort(), 20000);
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getDashboardData`, { signal: ctrl.signal });
                const result = await response.json();
                clearTimeout(timeout);
                if (result.status === 'success') {
                    window.appData = result; window.appData.isLoaded = true;
                    sessionStorage.setItem('pusda_app_data', JSON.stringify(result));
                    applyGlobalUI(); renderDashboardTools(); startHeroSlider();
                    document.getElementById('heroDescription').innerText = "Sinergi Ekosistem Digital Berjalan Optimal.";
                    if (window.saveToFirebase) window.saveToFirebase(result);
                }
            } catch (e) {
                if (retries > 0) {
                    setTimeout(() => fetchWithRetry(retries - 1, delay * 1.5), delay);
                } else if (!window.appData.isLoaded) {
                    handleSyncError("Jalur Informasi Digital Terputus.");
                } else {
                    document.getElementById('heroDescription').innerHTML = "Sinergi Ekosistem Digital Berjalan Optimal. <span style='color:var(--danger); font-size:0.6rem;'>(Mode Offline)</span>";
                }
            }
        }

        function handleSyncError(msg) {
            document.getElementById('toolsContainer').innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:50px;">
                    <i data-lucide="cloud-off" size="48" color="var(--danger)"></i>
                    <h3 style="margin-top:15px; font-weight:900;">HUBUNGAN TERPUTUS</h3>
                    <p style="opacity:0.6; font-size:0.8rem; margin:10px 0;">${msg}</p>
                    <button style="background:var(--accent-gradient); border:none; padding:12px 30px; border-radius:15px; color:white; font-weight:900; cursor:pointer;" onclick="location.reload()">PULIHKAN JARINGAN</button>
                </div>`;
            lucide.createIcons();
        }

        function renderDashboardTools() {
            const container = document.getElementById('toolsContainer');
            if (!container || !window.appData.isLoaded) return;
            const query = (document.getElementById('toolSearch')?.value || "").toLowerCase();
            const rawTools = [...(window.appData.tools || [])];
            const lapkinGroup = rawTools.filter(t => t.Nama.toLowerCase().includes("lapkin"));
            const otherTools = rawTools.filter(t => !t.Nama.toLowerCase().includes("lapkin"));
            let html = "";
            if(lapkinGroup.length > 0 && (!query || "lapkin".includes(query))) {
                html += `<div class="tool-card fade-in" onclick='openLapkinModal(${JSON.stringify(lapkinGroup).replace(/'/g, "&apos;")})'>
                    <div class="tool-icon" style="background:var(--accent-gradient)"><i data-lucide="folder-kanban"></i></div>
                    <div class="tool-name" style="font-weight:900; font-size:0.85rem;">LAPKIN</div>
                    <div style="font-size:0.55rem; opacity:0.5; margin-top:-10px;">${lapkinGroup.length} Modul</div>
                </div>`;
            }
            html += otherTools.filter(t => t.Nama.toLowerCase().includes(query)).map(t => {
                let url = t.Link_URL || '#';
                if(t.Nama === "E-Presensi") url = 'presensi.html';
                else if(t.Nama === "E-Raport") url = 'raport.html';
                else if(t.Nama === "Wilayah") url = 'wilayah.html';
                else if(t.Nama === "Live Preview") url = 'livepresensi.html';
                return `<div class="tool-card fade-in" onclick="location.href='${url}'">
                    <div class="tool-icon" style="background:${t.Warna || 'var(--primary)'}"><i data-lucide="${t.Icon || 'layers'}"></i></div>
                    <div class="tool-name" style="font-weight:900; font-size:0.85rem;">${t.Nama}</div>
                </div>`;
            }).join('');
            if(!query || "kas kantor".includes(query)) html += `<div class="tool-card fade-in" onclick="location.href='kas.html'"><div class="tool-icon" style="background:var(--toska);"><i data-lucide="wallet"></i></div><div class="tool-name" style="font-weight:900; font-size:0.85rem;">Kas Kantor</div></div>`;
            if(!query || "admin panel".includes(query)) html += `<div class="tool-card fade-in" onclick="location.href='admin.html'"><div class="tool-icon" style="background:var(--bg-body); border:1px solid var(--glass-border); color:var(--text-main);"><i data-lucide="shield-check"></i></div><div class="tool-name" style="font-weight:900; font-size:0.85rem;">Admin Panel</div></div>`;
            container.innerHTML = html; lucide.createIcons();
        }

        function openLapkinModal(items) {
            const container = document.getElementById('lapkinToolsContainer');
            container.innerHTML = items.map(t => `<div class="modal-item fade-in" onclick="location.href='${t.Link_URL}'"><div class="modal-icon"><i data-lucide="${t.Icon || 'file-text'}"></i></div><div class="modal-name">${t.Nama}</div></div>`).join('');
            document.getElementById('lapkinModal').classList.add('show'); lucide.createIcons();
        }
        function closeLapkinModal() { document.getElementById('lapkinModal').classList.remove('show'); }

        let slideIdx = 0;
        function startHeroSlider() {
            const img = document.getElementById('heroImage');
            const box = document.getElementById('heroPhotoBox');
            const data = window.appData.korlap;
            if (!img || !data || data.length === 0) return;
            const updateSlider = () => {
                const p = data[slideIdx % data.length];
                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = p.Link_Foto_Profile || '';
                    img.onload = () => {
                        box.classList.remove('skeleton');
                        img.style.opacity = '1';
                        const label = document.getElementById('heroLabel');
                        if(label) {
                            label.style.opacity = '1';
                            label.innerHTML = `<div style="font-weight:900; font-size:0.7rem; color:white; text-transform:uppercase;">${p.Nama}</div><div style="font-weight:800; font-size:0.5rem; color:var(--accent); text-transform:uppercase;">${p.Jabatan} ${p.Wilayah}</div>`;
                        }
                    };
                }, 400);
                slideIdx++;
            };
            updateSlider(); setInterval(updateSlider, 9000);
        }
        function applyGlobalUI() { const logo = window.appData.config?.Logo || FALLBACK_LOGO; document.querySelectorAll('.main-logo-src').forEach(el => el.src = logo); lucide.createIcons(); }
        function initClock() { setInterval(() => { const el = document.getElementById('clockSidebar'); if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000); }
        function initTheme() { if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme'); updateThemeUI(localStorage.getItem('theme') === 'light'); }
        function toggleTheme() { const isLight = document.body.classList.toggle('light-theme'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); updateThemeUI(isLight); }
        function updateThemeUI(isLight) {
            const sI = document.getElementById('sidebarThemeIcon'), mI = document.getElementById('mobileThemeIcon'), lbl = document.getElementById('themeLabel');
            if (mI) mI.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            if (sI) sI.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            if (lbl) lbl.innerText = isLight ? "LIGHT MODE" : "DARK MODE";
            lucide.createIcons();
        }
        function speechToText(id, btn) { if (!('webkitSpeechRecognition' in window)) return; const rec = new webkitSpeechRecognition(); rec.lang = 'id-ID'; rec.onstart = () => btn.classList.add('listening'); rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; renderDashboardTools(); }; rec.onend = () => btn.classList.remove('listening'); rec.start(); }
    </script>
</body>
</html>
