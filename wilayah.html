<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wilayah Kerja Master - SIM UPT PUSDA v21.9</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet Peta -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF7MP60nTfLmnA7_GhUedzAl58I51kfJmk_xePBhgVxVHaLtce51aBfCuSskPP67ym/exec";
        const FALLBACK_LOGO = "https://lh3.googleusercontent.com/d/1VYrfN1EG20Enf74vSyw1dGdskFujX8_r";
        window.appData = window.appData || { korlap: [], pegawai: [], presensi: [], config: {}, isLoaded: false };
    </script>
    
    <style>
        /* --- MASTER THEME v21.9 --- */
        :root {
            --primary: #1e3a8a; --primary-light: #3b82f6;
            --accent: #f97316; --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --success: #10b981; --danger: #ef4444; --toska: #06b6d4;
            --bg-body: #0f172a; --bg-gradient: radial-gradient(circle at top right, #1e40af, #0f172a 60%);
            --text-main: #f8fafc; --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(15px); --card-shadow: 0 20px 50px rgba(0,0,0,0.4);
            --sidebar-width: 280px;
        }

        body.light-theme {
            --bg-body: #f1f5f9; --bg-gradient: radial-gradient(circle at top right, #dbeafe, #f1f5f9 70%);
            --text-main: #1e293b; --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85); --glass-border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 15px 35px rgba(30, 41, 59, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); overflow-x: hidden; display: flex; min-height: 100vh; transition: 0.3s; }
        .fixed-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg-gradient); }

        /* --- SIDEBAR MASTER --- */
        #master-sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px 25px; display: flex; flex-direction: column; z-index: 1000; box-shadow: var(--card-shadow); }
        body.light-theme #master-sidebar { background: rgba(255,255,255,0.9); }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .brand img { height: 45px; object-fit: contain; }
        .brand h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.5px; }
        .logo-sim { color: var(--accent); } .logo-pu { color: var(--primary-light); } .logo-sda { color: var(--toska); }

        .nav-items { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { padding: 15px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 600; cursor: pointer; }
        .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); }

        /* SIDEBAR FOOTER & THEME FIX */
        .sidebar-footer { margin-top: auto; padding: 5px; }
        .authority-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px 15px; text-align: center; }
        .auth-label { font-size: 0.55rem; font-weight: 900; opacity: 0.5; letter-spacing: 1px; display: block; margin-bottom: 10px; text-transform: uppercase; }
        #clockSidebar { font-size: 1.6rem; font-weight: 900; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; }
        
        .theme-btn-sidebar { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-main); 
            font-weight: 800; font-size: 0.7rem; display: flex; align-items: center; 
            justify-content: center; gap: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; 
        }
        body.light-theme .theme-btn-sidebar { background: #fff; color: #1e293b; border-color: #cbd5e1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- MAIN CONTENT --- */
        #master-main-dashboard { flex: 1; margin-left: calc(var(--sidebar-width) + 40px); padding: 40px 2.5rem 150px 2.5rem; min-height: 100vh; position: relative; }
        .master-title-container { display: flex; align-items: center; gap: 18px; margin-bottom: 35px; }
        .master-accent-bar { width: 7px; height: 42px; background: var(--accent-gradient); border-radius: 4px; box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .master-title-text { font-size: clamp(1.4rem, 4.5vw, 2.3rem); letter-spacing: -1px; }
        .master-title-text span { font-weight: 900; text-transform: uppercase; }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .stat-card { background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 28px; padding: 25px; display: flex; align-items: center; gap: 20px; box-shadow: var(--card-shadow); }
        .stat-icon { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--accent); }

        /* --- KORLAP CARDS --- */
        .korlap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 50px; }
        .korlap-card { background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 40px; padding: 35px 25px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: var(--card-shadow); margin-top: 40px; }
        .korlap-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .korlap-img-container { width: 145px; height: 185px; margin-top: -100px; margin-bottom: 15px; position: relative; z-index: 5; }
        .korlap-thumb { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6)); }
        .korlap-area { font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; padding: 8px 18px; background: rgba(249, 115, 22, 0.1); border-radius: 14px; }
        .korlap-stats-inline { display: flex; width: 100%; justify-content: space-around; margin-bottom: 20px; padding: 15px 0; border-top: 1px solid var(--glass-border); }
        .inline-stat-val { font-weight: 900; font-size: 1.2rem; color: var(--text-main); }
        .inline-stat-lbl { font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; font-weight: 800; }

        /* --- MAP SECTION --- */
        .map-section { background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 32px; overflow: hidden; margin-top: 40px; box-shadow: var(--card-shadow); }
        #map { width: 100%; height: 500px; z-index: 1; filter: contrast(1.1) brightness(0.9); }
        .main-office-icon { filter: invert(58%) sepia(96%) saturate(2500%) hue-rotate(345deg) brightness(98%) contrast(97%) drop-shadow(0 0 8px rgba(249, 115, 22, 0.6)); }

        /* --- MOBILE PROTECTION (FIXED BUGS) --- */
        .theme-toggle-mobile { display: none !important; }
        #master-bottom-nav { display: none !important; }

        @media (max-width: 1024px) {
            #master-sidebar { display: none; }
            #master-main-dashboard { margin-left: 0; padding: 25px 0.5rem 140px 0.5rem; width: 100%; }
            #master-bottom-nav { 
                display: flex !important; position: fixed; bottom: 15px; left: 15px; right: 15px; 
                height: 75px; background: rgba(15, 23, 42, 0.95); border-radius: 22px; 
                justify-content: space-around; align-items: center; z-index: 2000; 
                box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            }
            .theme-toggle-mobile { 
                display: flex !important; position: fixed; top: 20px; right: 20px; 
                width: 52px; height: 52px; background: rgba(15, 23, 42, 0.85); 
                border-radius: 16px; z-index: 1001; align-items: center; justify-content: center; 
                cursor: pointer; color: white; box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
            }
            body.light-theme .theme-toggle-mobile { background: white; color: var(--primary); }

            #map { height: 380px; }
            .korlap-grid { gap: 60px; }
            .b-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 800; gap: 5px; }
            .b-nav-item.active { color: var(--accent); }
            .presensi-fab { background: var(--accent-gradient); width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; margin-top: -40px; border: 5px solid var(--bg-body); color: white; }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="fixed-bg"></div>
    <div class="theme-toggle-mobile" onclick="toggleTheme()" id="mobileThemeBtn"><i data-lucide="sun" id="mobileThemeIcon"></i></div>

    <!-- SIDEBAR MASTER -->
    <aside id="master-sidebar">
        <div class="brand">
            <img src="" class="main-logo-src" onerror="this.src='https://placehold.co/50x50?text=Logo'">
            <div><h1><span class="logo-sim">SIM</span> <span class="logo-pu">PU</span><span class="logo-sda">SDA</span></h1><p style="font-size:0.6rem; color:var(--accent); font-weight:800;">Bondoyudo Baru</p></div>
        </div>
        <nav class="nav-items">
            <!-- STANDARDIZED ORDER -->
            <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="fingerprint"></i> E-Presensi</a>
            <a href="livepresensi.html" class="nav-link"><i data-lucide="monitor-play"></i> Live Preview</a>
            <a href="wilayah.html" class="nav-link active"><i data-lucide="map"></i> Wilayah</a>
        </nav>
        <div class="sidebar-footer">
            <div class="authority-box">
                <span class="auth-label">SERVER AUTHORITY TIME</span>
                <div id="clockSidebar">00:00:00</div>
                <button class="theme-btn-sidebar" onclick="toggleTheme()" id="sidebarThemeBtn"><i data-lucide="moon" id="sidebarThemeIcon"></i><span id="themeLabel">DARK MODE</span></button>
            </div>
        </div>
    </aside>

    <main id="master-main-dashboard">
        <div class="master-title-container">
            <div class="master-accent-bar"></div>
            <div class="master-title-text"><span class="logo-sim">WILAYAH</span> <span class="logo-pu">& KOR</span><span class="logo-sda">LAP</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card fade-in">
                <div class="stat-icon"><i data-lucide="users"></i></div>
                <div>
                    <div style="font-size: 0.65rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Total Staf</div>
                    <div id="statTotalPeg" style="font-size: 1.5rem; font-weight: 900;">-</div>
                </div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.1s;">
                <div class="stat-icon" style="color: var(--success);"><i data-lucide="user-check"></i></div>
                <div>
                    <div style="font-size: 0.65rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Hadir Hari Ini</div>
                    <div id="statHadir" style="font-size: 1.5rem; font-weight: 900;">-</div>
                </div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.2s;">
                <div class="stat-icon" style="color: var(--primary-light);"><i data-lucide="map"></i></div>
                <div>
                    <div style="font-size: 0.65rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Sektor Kerja</div>
                    <div id="statWilayah" style="font-size: 1.5rem; font-weight: 900;">-</div>
                </div>
            </div>
        </div>

        <div id="korlapContainer" class="korlap-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 100px 20px; opacity: 0.3;">
                <i data-lucide="database-zap" class="spin" size="64" style="margin-bottom: 20px;"></i>
                <h3 style="font-weight: 900; text-transform: uppercase;">Menghubungkan Database Cloud...</h3>
            </div>
        </div>

        <div class="premium-title-container" style="margin-top: 70px;">
            <div style="width: 6px; height: 28px; background: var(--primary-light); border-radius: 3px;"></div>
            <span style="font-size: 1.4rem; font-weight: 900;">PEMETAAN ASET & KEJURON</span>
        </div>

        <div class="map-section fade-in">
            <div id="map"></div>
            <div style="padding: 20px; background: var(--glass); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem;">
                <div style="display: flex; gap: 25px;">
                    <span style="display:flex; align-items:center; gap:8px; font-weight: 800;"><i data-lucide="map-pin" size="14" color="var(--accent)"></i> KANTOR PERWAKILAN</span>
                </div>
                <div style="opacity: 0.5; font-weight: 900; text-transform:uppercase;">SIM UPT PUSDA © 2026</div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav id="master-bottom-nav">
        <a href="index.html" class="b-nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="raport.html" class="b-nav-item"><i data-lucide="file-text"></i><span>Raport</span></a>
        <div class="presensi-fab" onclick="location.href='presensi.html'"><i data-lucide="fingerprint" color="white" size="30"></i></div>
        <a href="livepresensi.html" class="b-nav-item"><i data-lucide="monitor-play"></i><span>Live</span></a>
        <a href="wilayah.html" class="b-nav-item active"><i data-lucide="map"></i><span>Wilayah</span></a>
    </nav>

    <script>
        let map;

        window.onload = async () => {
            lucide.createIcons(); initClock(); initTheme(); initMap();
            await fetchDashboardData();
        };

        async function fetchDashboardData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
                const result = await res.json();
                if (result.status === 'success') {
                    window.appData = result; window.appData.isLoaded = true;
                    renderWilayahStats(); renderKorlapCards(); updateLogos();
                }
            } catch (e) {
                const container = document.getElementById('korlapContainer');
                if(container) container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--danger); font-weight: 800;">SINKRONISASI GAGAL.</div>`;
            }
        }

        function updateLogos() {
            const finalLogo = window.appData.config?.Logo || FALLBACK_LOGO;
            document.querySelectorAll('.main-logo-src').forEach(el => el.src = finalLogo);
        }

        function renderWilayahStats() {
            const totalPeg = (window.appData.pegawai?.length || 0) + (window.appData.korlap?.length || 0);
            const today = new Date().toLocaleDateString('sv-SE');
            const hadirToday = (window.appData.presensi || []).filter(p => p.Timestamp?.split(' ')[0] === today).length;
            const sektorUnik = [...new Set((window.appData.korlap || []).map(k => k.Wilayah?.toUpperCase()))].length;
            document.getElementById('statTotalPeg').innerText = totalPeg;
            document.getElementById('statHadir').innerText = hadirToday;
            document.getElementById('statWilayah').innerText = sektorUnik || 0;
        }

        function renderKorlapCards() {
            const container = document.getElementById('korlapContainer');
            if (!container) return;
            const korlaps = window.appData.korlap || [];
            const pegawais = window.appData.pegawai || [];
            const today = new Date().toLocaleDateString('sv-SE');
            
            container.innerHTML = korlaps.map(k => {
                const wilKey = k.Wilayah?.toString().trim().toUpperCase() || '';
                const totalInArea = pegawais.filter(p => p.Wilayah?.toString().trim().toUpperCase() === wilKey).length;
                const hadirInArea = (window.appData.presensi || []).filter(p => p.Wilayah?.toString().trim().toUpperCase() === wilKey && p.Timestamp?.split(' ')[0] === today).length;

                return `
                <div class="korlap-card fade-in">
                    <div class="korlap-img-container">
                        <img src="${k.Link_Foto_Profile || ''}" class="korlap-thumb" onerror="this.src='https://placehold.co/145x185?text=USER'">
                    </div>
                    <div style="font-weight:900; font-size:1.2rem; margin-bottom:4px; color:var(--text-main); text-transform:uppercase;">${k.Nama}</div>
                    <div class="korlap-area">KORLAP ${k.Wilayah}</div>
                    <div class="korlap-stats-inline">
                        <div class="inline-stat-item"><span class="inline-stat-val">${totalInArea}</span><span class="inline-stat-lbl">Anggota</span></div>
                        <div class="inline-stat-item"><span class="inline-stat-val" style="color:var(--success)">${hadirInArea}</span><span class="inline-stat-lbl">Hadir</span></div>
                    </div>
                    <div style="width:100%; text-align:left; background:rgba(0,0,0,0.15); padding:18px; border-radius:24px; border:1px solid var(--glass-border);">
                        <div style="display:flex; gap:12px; margin-bottom:10px; font-size:0.75rem;"><i data-lucide="map-pin" size="14" style="color:var(--accent); flex-shrink:0;"></i><span style="font-weight:700; opacity:0.8;">${k.Lokasi_Kerja || '-'}</span></div>
                        <div style="display:flex; gap:12px; margin-bottom:18px; font-size:0.75rem;"><i data-lucide="phone" size="14" style="color:var(--primary-light); flex-shrink:0;"></i><span>${k.NoHP || '-'}</span></div>
                        <button class="theme-btn-sidebar" style="margin-top:0; font-size:0.6rem; border-color:var(--accent); color:var(--accent); height:35px; border-radius:10px;" onclick="focusMap('${k.Wilayah}')"><i data-lucide="navigation-2" size="12"></i> FOKUS AREA</button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function initMap() {
            if(map) map.remove();
            map = L.map('map').setView([-8.25, 113.8], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            const mainIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/8030/8030335.png', className: 'main-office-icon', iconSize: [40, 40], iconAnchor: [22, 45] });
            L.marker([-8.43372, 114.22131], {icon: mainIcon}).addTo(map).bindPopup('<b>Kantor UPT PSDA</b><br>Satker Banyuwangi');
            L.marker([-8.13553, 113.22595], {icon: mainIcon}).addTo(map).bindPopup('<b>Kantor UPT PSDA</b><br>Lumajang').openPopup();
        }

        function focusMap(wilayah) {
            const coords = { 'Bangorejo': [-8.46177, 114.16771], 'Cluring': [-8.4369, 114.2279], 'Pesanggaran': [-8.5616, 114.1006], 'Porolinggo': [-8.31357, 114.05213] };
            const target = coords[wilayah];
            if (target) {
                map.flyTo(target, 13, { duration: 2.5 });
                L.circle(target, { radius: 2000, color: '#f97316', fillOpacity: 0.1, weight: 2.5 }).addTo(map);
                L.marker(target).addTo(map).bindPopup(`<b>Pusat Sektor ${wilayah}</b>`).openPopup();
                if (window.innerWidth < 1024) document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function initClock() { setInterval(() => { const el = document.getElementById('clockSidebar'); if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000); }
        function initTheme() { if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme'); updateThemeIcons(localStorage.getItem('theme') === 'light'); }
        function toggleTheme() { const isLight = document.body.classList.toggle('light-theme'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); updateThemeIcons(isLight); }
        function updateThemeIcons(isLight) {
            const sI = document.getElementById('sidebarThemeIcon'), mI = document.getElementById('mobileThemeIcon'), lbl = document.getElementById('themeLabel');
            if (mI) mI.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            if (sI) sI.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            if (lbl) lbl.innerText = isLight ? "LIGHT MODE" : "DARK MODE";
            lucide.createIcons();
        }
    </script>
</body>
</html>
