<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wilayah Kerja - SIM UPT PUSDA</title>
    
    <!-- Meta untuk Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Library Ikon Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet Peta -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Link ke File CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <style>
        /* Penyesuaian Desain Senada dengan Index (Sudut 32px) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 35px; }
        
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 35px var(--card-shadow);
        }
        
        .stat-icon {
            width: 55px; height: 55px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); color: var(--accent);
        }

        .korlap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 20px; }
        
        .korlap-card {
            background: var(--glass); 
            border: 1px solid var(--glass-border);
            border-radius: 32px; 
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: visible;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 35px var(--card-shadow);
            margin-top: 40px;
        }
        
        .korlap-card:hover { transform: translateY(-10px); border-color: var(--primary-light); }

        .korlap-img-container {
            width: 130px; height: 170px;
            margin-top: -80px; 
            margin-bottom: 15px;
            position: relative;
            z-index: 5;
        }

        .korlap-thumb {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
            transition: 0.3s;
        }

        .korlap-card:hover .korlap-thumb { transform: scale(1.1) translateY(-5px); }

        .korlap-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 5px; color: var(--text-main); }
        .korlap-area { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; padding: 5px 15px; background: rgba(249, 115, 22, 0.1); border-radius: 12px; }
        
        .korlap-stats-inline {
            display: flex; width: 100%; justify-content: space-around; 
            margin-bottom: 20px; padding: 15px 0; border-top: 1px solid var(--glass-border);
        }
        
        .inline-stat-item { display: flex; flex-direction: column; gap: 4px; }
        .inline-stat-val { font-weight: 800; font-size: 1.1rem; color: #fff; }
        .inline-stat-lbl { font-size: 0.65rem; opacity: 0.6; text-transform: uppercase; font-weight: 700; }

        .korlap-info-box {
            width: 100%; background: rgba(0,0,0,0.2); 
            padding: 20px; border-radius: 24px; 
            border: 1px solid var(--glass-border);
            text-align: left; font-size: 0.85rem; line-height: 1.5;
        }

        .map-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            margin-top: 40px;
            box-shadow: 0 20px 50px var(--card-shadow);
        }

        #map { width: 100%; height: 500px; z-index: 1; filter: contrast(1.1) brightness(0.9); }

        @media (max-width: 768px) {
            .main-content { padding: 20px 15px 120px; }
            .korlap-grid { gap: 60px; }
            .map-section { border-radius: 28px; }
            #map { height: 350px; }
        }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>

    <!-- TOGGLE THEME MOBILE -->
    <div class="theme-toggle-mobile rounded-2xl" onclick="toggleTheme()" style="display: flex; align-items: center; justify-content: center;">
        <i data-lucide="sun-moon"></i>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <img src="assets/img/logo.png" id="sidebarLogo" alt="Logo">
            <div>
                <h1>E-PUSDA</h1>
                <p>Bondoyudo Baru</p>
            </div>
        </div>

        <nav class="nav-items">
            <a href="index.html" class="nav-link">
                <i data-lucide="layout-grid"></i> Dashboard
            </a>
            <a href="raport.html" class="nav-link">
                <i data-lucide="file-bar-chart"></i> E-Raport
            </a>
            <a href="presensi.html" class="nav-link">
                <i data-lucide="scan-face"></i> E-Presensi
            </a>
            <a href="wilayah.html" class="nav-link active">
                <i data-lucide="map"></i> Wilayah
            </a>
            <a href="admin.html" class="nav-link">
                <i data-lucide="shield-check"></i> Admin Panel
            </a>
        </nav>

        <div class="sidebar-footer rounded-3xl">
            <div id="clockSidebar" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 15px;">00:00:00</div>
            <button class="btn btn-primary rounded-2xl" onclick="toggleTheme()" style="width: 100%; padding: 10px; font-size: 0.8rem;">
                <i data-lucide="sun-moon" size="18"></i> Tema
            </button>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
        <div class="section-title" style="margin-bottom: 25px; font-weight: 800; display: flex; align-items: center; gap: 14px;">
            <div style="width: 6px; height: 26px; background: var(--accent); border-radius: 3px;"></div>
            <span style="font-size: 1.5rem; letter-spacing: -0.5px;">Monitoring Wilayah & Korlap</span>
        </div>

        <!-- Ringkasan Statistik Sinkronisasi Sheet -->
        <div class="stats-grid">
            <div class="stat-card fade-in">
                <div class="stat-icon"><i data-lucide="users"></i></div>
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Total Pegawai</div>
                    <div id="statTotalPeg" style="font-size: 1.4rem; font-weight: 800;">-</div>
                </div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.1s;">
                <div class="stat-icon" style="color: var(--success);"><i data-lucide="user-check"></i></div>
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Hadir Hari Ini</div>
                    <div id="statHadir" style="font-size: 1.4rem; font-weight: 800;">-</div>
                </div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.2s;">
                <div class="stat-icon" style="color: var(--primary-light);"><i data-lucide="map"></i></div>
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Cakupan Wilayah</div>
                    <div id="statWilayah" style="font-size: 1.4rem; font-weight: 800;">4</div>
                </div>
            </div>
        </div>

        <!-- Section Korlap Cards -->
        <div id="korlapContainer" class="korlap-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 60px; opacity: 0.5;">
                <i data-lucide="loader-2" class="spin" size="48"></i>
                <p style="margin-top: 15px; font-weight: 800;">MENSINKRONKAN DATABASE...</p>
            </div>
        </div>

        <!-- Section Peta Interaktif -->
        <div class="section-title" style="margin-top: 60px; margin-bottom: 25px;">
            <div style="width: 6px; height: 26px; background: var(--primary-light); border-radius: 3px;"></div>
            <span style="font-size: 1.3rem;">Pemetaan Aset & Wilayah Kerja</span>
        </div>

        <div class="map-section fade-in">
            <div id="map"></div>
            <div style="padding: 20px; background: var(--glass); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;">
                <div style="display: flex; gap: 20px;">
                    <span style="display:flex; align-items:center; gap:8px;"><i data-lucide="map-pin" size="16" color="var(--accent)"></i> Kantor Perwakilan</span>
                    <span style="display:flex; align-items:center; gap:8px;"><i data-lucide="navigation" size="16" color="var(--primary-light)"></i> Batas Kejuron</span>
                </div>
                <div style="opacity: 0.6; font-weight: 600;">SIM UPT PUSDA © 2026</div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <a href="index.html" class="b-nav-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </a>
        <a href="raport.html" class="b-nav-item">
            <i data-lucide="file-text"></i>
            <span>Raport</span>
        </a>
        <a href="presensi.html" class="b-nav-item">
            <div class="presensi-fab">
                <i data-lucide="scan-face" color="white"></i>
            </div>
        </a>
        <a href="wilayah.html" class="b-nav-item active">
            <i data-lucide="map"></i>
            <span>Wilayah</span>
        </a>
        <a href="admin.html" class="b-nav-item">
            <i data-lucide="user-cog"></i>
            <span>Admin</span>
        </a>
    </nav>

    <script src="assets/js/main.js"></script>
    
    <script>
        // Inisialisasi appData global dengan struktur lengkap
        window.appData = window.appData || { korlap: [], pegawai: [], presensi: [], config: {} };

        window.addEventListener('load', () => {
            initMap();
            
            // Interval cek sinkronisasi data dari main.js
            const syncInterval = setInterval(() => {
                if (window.appData && window.appData.korlap && window.appData.korlap.length > 0) {
                    renderWilayahStats();
                    renderKorlapCards();
                    updateSidebarLogo();
                    clearInterval(syncInterval);
                }
            }, 800);
            
            setTimeout(() => clearInterval(syncInterval), 15000);
        });

        /**
         * Sinkronisasi data dari MS_PEG dan E_PRES untuk statistik wilayah
         */
        function renderWilayahStats() {
            const totalPeg = window.appData.pegawai ? window.appData.pegawai.length : 0;
            const today = new Date().toISOString().split('T')[0];
            
            // Hitung kehadiran hari ini dari E_PRES (appData.presensi)
            const hadirToday = window.appData.presensi ? 
                window.appData.presensi.filter(p => p.Timestamp && p.Timestamp.includes(today)).length : 0;

            document.getElementById('statTotalPeg').innerText = totalPeg;
            document.getElementById('statHadir').innerText = hadirToday;
            document.getElementById('statWilayah').innerText = window.appData.korlap.length;
        }

        /**
         * Render Kartu Korlap dengan Data Sinkron dari Berbagai Sheet
         */
        function renderKorlapCards() {
            const container = document.getElementById('korlapContainer');
            if (!container) return;

            const korlaps = window.appData.korlap || [];
            const pegawais = window.appData.pegawai || [];
            const today = new Date().toISOString().split('T')[0];
            
            container.innerHTML = korlaps.map(k => {
                // Hitung jumlah pegawai di wilayah ini (Sync MS_PEG)
                const totalInArea = pegawais.filter(p => p.Wilayah && p.Wilayah.toLowerCase() === k.Wilayah.toLowerCase()).length;
                
                // Hitung kehadiran hari ini di wilayah ini (Sync E_PRES)
                const hadirInArea = window.appData.presensi ? 
                    window.appData.presensi.filter(p => 
                        p.Wilayah && p.Wilayah.toLowerCase() === k.Wilayah.toLowerCase() && 
                        p.Timestamp && p.Timestamp.includes(today)
                    ).length : 0;

                return `
                <div class="korlap-card fade-in">
                    <div class="korlap-img-container">
                        <img src="${k.Link_Foto_Profile || 'https://placehold.co/130x170?text=PNG'}" class="korlap-thumb" onerror="this.src='https://placehold.co/130x170?text=User'">
                    </div>
                    <div class="korlap-name">${k.Nama}</div>
                    <div class="korlap-area">${k.Wilayah}</div>
                    
                    <div class="korlap-stats-inline">
                        <div class="inline-stat-item">
                            <span class="inline-stat-val">${totalInArea}</span>
                            <span class="inline-stat-lbl">Pegawai</span>
                        </div>
                        <div class="inline-stat-item">
                            <span class="inline-stat-val" style="color:var(--success)">${hadirInArea}</span>
                            <span class="inline-stat-lbl">Hadir</span>
                        </div>
                    </div>

                    <div class="korlap-info-box">
                        <div style="display:flex; gap:10px; margin-bottom:10px;">
                            <i data-lucide="map-pin" size="16" style="color:var(--accent); flex-shrink:0;"></i>
                            <span style="font-weight:600;">${k.Lokasi_Kerja || 'Detail kejuron belum diatur.'}</span>
                        </div>
                        <div style="display:flex; gap:10px; margin-bottom:12px;">
                            <i data-lucide="phone" size="16" style="color:var(--primary-light); flex-shrink:0;"></i>
                            <span>${k.NoHP || '-'}</span>
                        </div>
                        <button class="btn" style="width:100%; padding:10px; background:rgba(255,255,255,0.05); font-size:0.75rem; font-weight:800; border:1px solid var(--glass-border); border-radius:14px;" onclick="focusMap('${k.Wilayah}')">
                            <i data-lucide="navigation-2" size="14"></i> LIHAT AREA KERJA
                        </button>
                    </div>
                </div>
            `;}).join('');
            
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        let map;
        function initMap() {
            // Koordinat default: Lumajang (Pusat WS Bondoyudo)
            map = L.map('map').setView([-8.232, 113.250], 11);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Marker Kantor Utama
            const mainIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/8030/8030335.png',
                iconSize: [45, 45],
                iconAnchor: [22, 45]
            });
            
            L.marker([-8.232, 113.250], {icon: mainIcon}).addTo(map)
                .bindPopup('<b>Kantor UPT PSDA</b><br>WS Bondoyudo Baru')
                .openPopup();
        }

        function focusMap(wilayah) {
            const coords = {
                'Bangorejo': [-8.482, 114.150],
                'Cluring': [-8.423, 114.218],
                'Pesanggaran': [-8.560, 114.050],
                'Porolinggo': [-8.350, 114.120]
            };
            
            const target = coords[wilayah];
            if (target) {
                map.flyTo(target, 13, { duration: 2 });
                L.circle(target, { radius: 1500, color: '#f97316', fillOpacity: 0.1 }).addTo(map);
                L.marker(target).addTo(map).bindPopup(`<b>Pusat Operasional Wilayah ${wilayah}</b>`).openPopup();
                
                if (window.innerWidth < 768) {
                    document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
                }
            }
        }

        function updateSidebarLogo() {
            if (window.appData.config?.Logo) {
                document.getElementById('sidebarLogo').src = window.appData.config.Logo;
            }
        }
    </script>
</body>

</html>
