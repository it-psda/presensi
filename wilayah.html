<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wilayah Kerja Master - SIM UPT PUSDA v18.6</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet Peta -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        /**
         * CONFIG & GLOBAL ENGINE v18.6
         * Sinkronisasi Koordinat Manual & Database Cloud
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF7MP60nTfLmnA7_GhUedzAl58I51kfJmk_xePBhgVxVHaLtce51aBfCuSskPP67ym/exec";
        const FALLBACK_LOGO = "https://lh3.googleusercontent.com/d/1VYrfN1EG20Enf74vSyw1dGdskFujX8_r";
        window.appData = window.appData || { korlap: [], pegawai: [], presensi: [], config: {}, isLoaded: false };
    </script>
    
    <style>
        /* --- MASTER THEME v18.6 (ULTIMATE PERFORMANCE) --- */
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #f97316;
            --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --success: #10b981;
            --danger: #ef4444;
            --bg-body: #0f172a;
            --bg-gradient: radial-gradient(circle at top right, #1e40af, #0f172a 60%);
            --text-main: #f8fafc;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(15px);
            --card-shadow: 0 20px 50px rgba(0,0,0,0.4);
            --sidebar-width: 280px;
        }

        body.light-theme {
            --bg-body: #f1f5f9;
            --bg-gradient: radial-gradient(circle at top right, #dbeafe, #f1f5f9 70%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 15px 35px rgba(30, 41, 59, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); overflow-x: hidden; display: flex; min-height: 100vh; transition: background 0.3s; }
        .fixed-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg-gradient); }

        /* --- SIDEBAR MASTER --- */
        #master-app-sidebar { 
            width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; 
            top: 20px; left: 20px; background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 30px 25px; display: flex; flex-direction: column; 
            z-index: 1000; box-shadow: var(--card-shadow); 
        }
        body.light-theme #master-app-sidebar { background: rgba(255,255,255,0.85); }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .brand img { height: 45px; object-fit: contain; }
        .brand h1 { font-size: 1.2rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }

        .nav-items { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { padding: 15px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 600; cursor: pointer; }
        .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); }

        /* Sidebar Footer */
        .sidebar-footer { 
            margin-top: auto; padding: 18px; background: rgba(255, 255, 255, 0.04); 
            border: 1px solid var(--glass-border); border-radius: 20px; text-align: center; 
        }
        #clockSidebar { font-size: 1.25rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .theme-btn-sidebar {
            width: 100%; margin-top: 10px; padding: 12px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main);
            font-size: 0.7rem; font-weight: 800; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            text-transform: uppercase;
        }

        /* --- MAIN CONTENT LAYOUT --- */
        #master-main-dashboard { 
            flex: 1; margin-left: calc(var(--sidebar-width) + 40px); 
            padding: 40px 2.5rem 150px 2.5rem; min-height: 100vh; position: relative; 
            display: block !important; /* Force top-to-bottom flow */
        }
        .master-title-container { display: flex; align-items: center; gap: 18px; margin-bottom: 35px; }
        .master-accent-bar { width: 7px; height: 42px; background: var(--accent-gradient); border-radius: 4px; box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .master-title-text { font-size: clamp(1.6rem, 4.5vw, 2.3rem); font-weight: 400; color: var(--text-main); letter-spacing: -1.5px; }
        .master-title-text span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .stat-card {
            background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 25px; display: flex; align-items: center; gap: 20px; box-shadow: var(--card-shadow);
        }
        .stat-icon { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--accent); }

        /* --- KORLAP CARDS --- */
        .korlap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 50px; }
        .korlap-card {
            background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
            border-radius: 32px; padding: 35px 25px; display: flex; flex-direction: column; align-items: center; text-align: center;
            position: relative; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: var(--card-shadow); margin-top: 40px;
        }
        .korlap-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .korlap-img-container { width: 130px; height: 170px; margin-top: -90px; margin-bottom: 15px; position: relative; z-index: 5; }
        .korlap-thumb { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6)); transition: 0.3s; }
        .korlap-area { font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; padding: 8px 18px; background: rgba(249, 115, 22, 0.1); border-radius: 14px; }
        .korlap-stats-inline { display: flex; width: 100%; justify-content: space-around; margin-bottom: 20px; padding: 15px 0; border-top: 1px solid var(--glass-border); }
        .inline-stat-val { font-weight: 900; font-size: 1.2rem; color: var(--text-main); }
        .inline-stat-lbl { font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; font-weight: 800; }

        /* --- MAP SECTION --- */
        .map-section { background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 32px; overflow: hidden; margin-top: 40px; box-shadow: var(--card-shadow); }
        #map { width: 100%; height: 500px; z-index: 1; filter: contrast(1.1) brightness(0.9); }
        /* Marker CSS Filter */
        .main-office-icon { filter: invert(58%) sepia(96%) saturate(2500%) hue-rotate(345deg) brightness(98%) contrast(97%) drop-shadow(0 0 8px rgba(249, 115, 22, 0.6)); }

        /* --- UI NAVIGATION PROTECTOR --- */
        #master-bottom-nav { 
            display: none !important; /* Force hide on Desktop */
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: var(--glass-blur); 
            border: 1px solid var(--glass-border); border-radius: 22px; 
            justify-content: space-around; align-items: center; z-index: 2000; 
            box-shadow: var(--card-shadow); 
        }

        .theme-toggle-mobile { 
            display: none; position: fixed; top: 20px; right: 20px; 
            width: 52px; height: 52px; background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); 
            border-radius: 16px; z-index: 1001; align-items: center; justify-content: center; 
            cursor: pointer; color: white; box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3); transition: 0.3s;
        }

        @media (max-width: 1024px) {
            #master-app-sidebar { display: none; }
            #master-main-dashboard { margin-left: 0; padding: 25px 0.8rem 140px 0.8rem; }
            #master-bottom-nav { display: flex !important; }
            .theme-toggle-mobile { display: flex !important; }
            #map { height: 380px; }
            .korlap-grid { gap: 60px; }
            .b-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.65rem; font-weight: 800; gap: 5px; }
            .b-nav-item.active { color: var(--accent); }
            .presensi-fab { background: var(--accent-gradient); width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; margin-top: -40px; border: 5px solid var(--bg-body); color: white; }
        }

        @media print {
            body { display: block !important; background: white !important; color: black !important; padding: 0 !important; }
            #master-app-sidebar, #master-bottom-nav, .theme-toggle-mobile, .fixed-bg { display: none !important; }
            #master-main-dashboard { margin: 0 !important; width: 100% !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="fixed-bg"></div>

    <!-- THEME TOGGLE MOBILE -->
    <div class="theme-toggle-mobile" onclick="toggleTheme()" id="mobileThemeBtn">
        <i data-lucide="sun" id="mobileThemeIcon"></i>
    </div>

    <!-- SIDEBAR MASTER -->
    <aside id="master-app-sidebar">
        <div class="brand">
            <img src="" id="sidebarLogo" class="main-logo-src" onerror="this.src='https://placehold.co/50x50?text=Logo'">
            <div><h1>SIM PUSDA</h1><p style="font-size:0.6rem; color:var(--accent); font-weight:800;">Bondoyudo Baru</p></div>
        </div>
        <nav class="nav-items">
            <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="scan-face"></i> E-Presensi</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="wilayah.html" class="nav-link active"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>
        
        <!-- SIDEBAR FOOTER -->
        <div class="sidebar-footer">
            <div style="font-size: 0.55rem; font-weight: 900; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px;">Server Time Authority</div>
            <div id="clockSidebar">00:00:00</div>
            <button class="theme-btn-sidebar" onclick="toggleTheme()" id="sidebarThemeBtn">
                <i data-lucide="moon" size="14" id="sidebarThemeIcon"></i>
                <span id="themeLabel">Dark Mode</span>
            </button>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main id="master-main-dashboard">
        <div class="master-title-container">
            <div class="master-accent-bar"></div>
            <div class="master-title-text"><b>Wilayah</b><span> & Korlap</span></div>
        </div>

        <!-- Ringkasan Statistik -->
        <div class="stats-grid">
            <div class="stat-card fade-in">
                <div class="stat-icon"><i data-lucide="users"></i></div>
                <div>
                    <div style="font-size: 0.65rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Total Staf</div>
                    <div id="statTotalPeg" style="font-size: 1.5rem; font-weight: 900;">-</div>
                </div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.1s;">
                <div class="stat-icon" style="color: var(--success);"><i data-lucide="user-check"></i></div>
                <div>
                    <div style="font-size: 0.65rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Hadir Hari Ini</div>
                    <div id="statHadir" style="font-size: 1.5rem; font-weight: 900;">-</div>
                </div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.2s;">
                <div class="stat-icon" style="color: var(--primary-light);"><i data-lucide="map"></i></div>
                <div>
                    <div style="font-size: 0.65rem; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Sektor Kerja</div>
                    <div id="statWilayah" style="font-size: 1.5rem; font-weight: 900;">-</div>
                </div>
            </div>
        </div>

        <!-- Section Korlap Cards -->
        <div id="korlapContainer" class="korlap-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 100px 20px; opacity: 0.3;">
                <i data-lucide="database-zap" class="spin" size="64" style="margin-bottom: 20px;"></i>
                <h3 style="font-weight: 900; text-transform: uppercase;">Menghubungkan Database Cloud...</h3>
            </div>
        </div>

        <!-- Peta Interaktif -->
        <div class="premium-title-container" style="margin-top: 70px; display: flex; align-items: center; gap: 15px;">
            <div style="width: 6px; height: 28px; background: var(--primary-light); border-radius: 3px;"></div>
            <span style="font-size: 1.4rem; font-weight: 900;">Pemetaan Aset & Kejuron</span>
        </div>

        <div class="map-section fade-in">
            <div id="map"></div>
            <div style="padding: 20px; background: var(--glass); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem;">
                <div style="display: flex; gap: 25px;">
                    <span style="display:flex; align-items:center; gap:8px; font-weight: 700;"><i data-lucide="map-pin" size="14" color="var(--accent)"></i> Kantor Perwakilan</span>
                </div>
                <div style="opacity: 0.5; font-weight: 800;">SIM UPT PUSDA © 2026</div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION (MOBILE ONLY) -->
    <nav id="master-bottom-nav">
        <a href="index.html" class="b-nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="raport.html" class="b-nav-item"><i data-lucide="file-text"></i><span>Raport</span></a>
        <div class="presensi-fab" onclick="location.href='presensi.html'"><i data-lucide="scan-face" color="white" size="28"></i></div>
        <a href="wilayah.html" class="b-nav-item active"><i data-lucide="map"></i><span>Wilayah</span></a>
        <a href="admin.html" class="b-nav-item"><i data-lucide="user-cog"></i><span>Admin</span></a>
    </nav>

    <script>
        let map;

        window.onload = async () => {
            lucide.createIcons();
            initClock();
            initTheme();
            initMap();
            await fetchDashboardData();
        };

        async function fetchDashboardData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`, {
                    method: 'GET',
                    mode: 'cors',
                    redirect: 'follow'
                });
                const result = await res.json();
                if (result.status === 'success') {
                    window.appData = {
                        pegawai: result.pegawai || [],
                        korlap: result.korlap || [],
                        presensi: result.presensi || [],
                        config: result.config || {},
                        isLoaded: true
                    };
                    renderWilayahStats();
                    renderKorlapCards();
                    updateLogos();
                }
            } catch (e) {
                console.error("🔴 Fatal Sync Error");
                const container = document.getElementById('korlapContainer');
                if(container) container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--danger); font-weight: 800;">SINKRONISASI GAGAL. SILAKAN MUAT ULANG.</div>`;
            }
        }

        function updateLogos() {
            const finalLogo = window.appData.config?.Logo || FALLBACK_LOGO;
            document.querySelectorAll('.main-logo-src').forEach(el => el.src = finalLogo);
        }

        function renderWilayahStats() {
            const totalPeg = (window.appData.pegawai?.length || 0) + (window.appData.korlap?.length || 0);
            const today = new Date().toLocaleDateString('sv-SE'); // Format YYYY-MM-DD
            const hadirToday = (window.appData.presensi || []).filter(p => {
                const ts = p.Timestamp ? p.Timestamp.split(' ')[0] : '';
                return ts === today;
            }).length;

            const sektorUnik = [...new Set((window.appData.korlap || []).map(k => k.Wilayah?.toUpperCase()))].length;

            document.getElementById('statTotalPeg').innerText = totalPeg;
            document.getElementById('statHadir').innerText = hadirToday;
            document.getElementById('statWilayah').innerText = sektorUnik || 0;
        }

        function renderKorlapCards() {
            const container = document.getElementById('korlapContainer');
            if (!container) return;
            const korlaps = window.appData.korlap || [];
            const pegawais = window.appData.pegawai || [];
            const today = new Date().toLocaleDateString('sv-SE');
            
            container.innerHTML = korlaps.map(k => {
                const wilKey = k.Wilayah?.toString().trim().toUpperCase() || '';
                const totalInArea = pegawais.filter(p => p.Wilayah?.toString().trim().toUpperCase() === wilKey).length;
                const hadirInArea = (window.appData.presensi || []).filter(p => {
                    const pWil = p.Wilayah?.toString().trim().toUpperCase() || '';
                    const pTs = p.Timestamp?.split(' ')[0] || '';
                    return pWil === wilKey && pTs === today;
                }).length;

                return `
                <div class="korlap-card fade-in">
                    <div class="korlap-img-container">
                        <img src="${k.Link_Foto_Profile || ''}" class="korlap-thumb" onerror="this.src='https://placehold.co/130x170?text=USER'">
                    </div>
                    <div style="font-weight:900; font-size:1.2rem; margin-bottom:4px; color:var(--text-main);">${k.Nama}</div>
                    <div class="korlap-area">KORLAP ${k.Wilayah}</div>
                    
                    <div class="korlap-stats-inline">
                        <div class="inline-stat-item">
                            <span class="inline-stat-val">${totalInArea}</span>
                            <span class="inline-stat-lbl">Anggota</span>
                        </div>
                        <div class="inline-stat-item">
                            <span class="inline-stat-val" style="color:var(--success)">${hadirInArea}</span>
                            <span class="inline-stat-lbl">Hadir</span>
                        </div>
                    </div>

                    <div style="width:100%; text-align:left; background:rgba(0,0,0,0.15); padding:18px; border-radius:20px; border:1px solid var(--glass-border);">
                        <div style="display:flex; gap:12px; margin-bottom:10px; font-size:0.8rem;">
                            <i data-lucide="map-pin" size="14" style="color:var(--accent); flex-shrink:0;"></i>
                            <span style="font-weight:700;">${k.Lokasi_Kerja || 'Detail area belum tersedia.'}</span>
                        </div>
                        <div style="display:flex; gap:12px; margin-bottom:18px; font-size:0.8rem;">
                            <i data-lucide="phone" size="14" style="color:var(--primary-light); flex-shrink:0;"></i>
                            <span>${k.NoHP || '-'}</span>
                        </div>
                        <button class="theme-btn-sidebar" style="margin-top:0; font-size:0.65rem; border-color:var(--accent); color:var(--accent);" onclick="focusMap('${k.Wilayah}')">
                            <i data-lucide="navigation-2" size="12"></i> FOKUS AREA KERJA
                        </button>
                    </div>
                </div>`;
            }).join('');
            
            lucide.createIcons();
        }

        function initMap() {
            if(map) map.remove();
            // Pusat awal di antara Lumajang & Banyuwangi
            map = L.map('map').setView([-8.25, 113.8], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Marker Kantor Utama Custom
            const mainIcon = L.icon({ 
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/8030/8030335.png', 
                className: 'main-office-icon', 
                iconSize: [40, 40], 
                iconAnchor: [22, 45] 
            });

            // Kantor Banyuwangi
            L.marker([-8.43372, 114.22131], {icon: mainIcon}).addTo(map)
                .bindPopup('<b>Kantor UPT PSDA</b><br>Satker Banyuwangi');

            // Kantor Lumajang
            L.marker([-8.13553, 113.22595], {icon: mainIcon}).addTo(map)
                .bindPopup('<b>Kantor UPT PSDA</b><br>WS Bondoyudo Baru Lumajang')
                .openPopup();
        }

        function focusMap(wilayah) {
            const coords = { 
                'Bangorejo': [-8.46177, 114.16771], 
                'Cluring': [-8.4369, 114.2279], 
                'Pesanggaran': [-8.5616, 114.1006], 
                'Porolinggo': [-8.31357, 114.05213] 
            };
            const target = coords[wilayah];
            if (target) {
                map.flyTo(target, 13, { duration: 2.5 });
                L.circle(target, { radius: 2000, color: '#f97316', fillOpacity: 0.1, weight: 2.5 }).addTo(map);
                L.marker(target).addTo(map).bindPopup(`<b>Pusat Sektor ${wilayah}</b>`).openPopup();
                
                if (window.innerWidth < 1024) {
                    const el = document.getElementById('map');
                    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function initClock() { 
            setInterval(() => { 
                const el = document.getElementById('clockSidebar'); 
                if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); 
            }, 1000); 
        }

        function initTheme() {
            const isLight = localStorage.getItem('theme') === 'light';
            if (isLight) document.body.classList.add('light-theme');
            updateThemeIcons(isLight);
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcons(isLight);
        }

        function updateThemeIcons(isLight) {
            const sI = document.getElementById('sidebarThemeIcon'), mI = document.getElementById('mobileThemeIcon'), lbl = document.getElementById('themeLabel');
            if (isLight) { 
                sI?.setAttribute('data-lucide', 'sun'); 
                mI?.setAttribute('data-lucide', 'moon'); 
                if(lbl) lbl.innerText = "Light Mode"; 
            } else { 
                sI?.setAttribute('data-lucide', 'moon'); 
                mI?.setAttribute('data-lucide', 'sun'); 
                if(lbl) lbl.innerText = "Dark Mode"; 
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
