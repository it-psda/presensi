<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Presensi Master - SIM UPT PUSDA v2.4</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        /**
         * CONFIG & LIVE ENGINE v2.4 (HEAD-SAFE)
         * Desain: Pop-Out Tanpa Terpotong (Overflow Visible Logic)
         * Perbaikan: Sinkronisasi Fungsi Tema & Desktop Bottom-nav
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF7MP60nTfLmnA7_GhUedzAl58I51kfJmk_xePBhgVxVHaLtce51aBfCuSskPP67ym/exec";
        const FALLBACK_LOGO = "https://lh3.googleusercontent.com/d/1VYrfN1EG20Enf74vSyw1dGdskFujX8_r";
        window.appData = window.appData || { pegawai: [], korlap: [], presensi: [], config: {}, isLoaded: false };
    </script>

    <style>
        /* --- MASTER THEME v2.4 (ULTIMATE PERFORMANCE) --- */
        :root {
            --primary: #1e3a8a; --primary-light: #3b82f6;
            --accent: #f97316; --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --toska: #06b6d4; --pink: #f472b6; --purple: #a855f7;
            --bg-body: #0f172a; --bg-gradient: radial-gradient(circle at top right, #1e40af, #0f172a 60%);
            --text-main: #f8fafc; --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(15px); --sidebar-width: 280px;
        }

        body.light-theme {
            --bg-body: #f1f5f9; --bg-gradient: radial-gradient(circle at top right, #dbeafe, #f1f5f9 70%);
            --text-main: #1e293b; --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8); --glass-border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); overflow-x: hidden; display: flex; min-height: 100vh; transition: background 0.3s; }
        .fixed-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg-gradient); }

        /* --- SIDEBAR MASTER --- */
        #master-sidebar { 
            width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; 
            top: 20px; left: 20px; background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 30px 25px; display: flex; flex-direction: column; 
            z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
        }
        body.light-theme #master-sidebar { background: rgba(255,255,255,0.85); }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .brand img { height: 45px; object-fit: contain; }
        .brand h1 { font-size: 1.1rem; font-weight: 900; color: #fff; }

        .nav-items { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { padding: 15px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 600; cursor: pointer; }
        .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); }

        .sidebar-footer { margin-top: auto; padding: 18px; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); border-radius: 20px; text-align: center; }
        #clockSidebar { font-size: 1.25rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; }
        .theme-btn { width: 100%; padding: 12px; border-radius: 12px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; margin-left: calc(var(--sidebar-width) + 40px); padding: 40px 2rem 120px 2rem; }
        .header-box { display: flex; align-items: center; gap: 18px; margin-bottom: 35px; }
        .accent-bar { width: 7px; height: 35px; background: var(--accent-gradient); border-radius: 4px; }
        .header-box h2 { font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .header-box h2 span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- STATS BAR --- */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; text-align: center; backdrop-filter: var(--glass-blur); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stat-val { font-size: 1.5rem; font-weight: 900; display: block; }
        .stat-lbl { font-size: 0.55rem; font-weight: 800; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* --- FILTERS --- */
        .filter-section { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .search-wrapper { flex: 2; position: relative; min-width: 250px; }
        input, select { width: 100%; padding: 15px 20px; border-radius: 18px; background: rgba(0,0,0,0.25); border: 1.5px solid var(--glass-border); color: white; font-weight: 700; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }
        
        .mic-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent-gradient); border: none; width: 40px; height: 40px; border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-btn.listening { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }

        /* --- STAF CARDS (NO-CROP AUTHORITY v2.4) --- */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 35px; }
        .staf-card { 
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 32px; 
            padding: 25px; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
            backdrop-filter: var(--glass-blur); display: flex; flex-direction: column; 
            gap: 15px; position: relative; overflow: visible; /* Penting: Biarkan meluap */
        }
        .staf-card:hover { border-color: var(--primary-light); box-shadow: 0 25px 50px rgba(0,0,0,0.3); z-index: 100; }
        
        .card-top { display: flex; gap: 20px; align-items: center; position: relative; overflow: visible; z-index: 2; }
        
        /* Avatar Container Berpanggung Tinggi */
        .avatar-container { 
            position: relative; width: 100px; height: 140px; /* Tinggi ekstra agar tidak terpotong */
            display: flex; align-items: flex-end; justify-content: center; 
            flex-shrink: 0; overflow: visible; 
        }
        
        .avatar-decoration { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1; }
        .avatar-decoration::before { content: ''; position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 0); width: 90px; height: 90px; border: 1.5px solid var(--primary-light); border-radius: 50%; opacity: 0.2; }
        .avatar-decoration::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translate(-50%, 0); width: 115px; height: 115px; border: 0.8px dashed var(--accent); border-radius: 50%; opacity: 0.3; animation: spin 15s linear infinite; }
        
        .avatar-box { 
            position: relative; width: 85px; height: 115px; 
            border-radius: 22px; overflow: visible; z-index: 10;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); 
            border: 1.5px solid var(--glass-border); 
            transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: flex-end; justify-content: center;
        }

        .avatar-box img { 
            width: 135%; height: auto; max-height: 160px; /* Lebar lebih besar agar terkesan keluar */
            object-fit: contain; transform-origin: bottom center; 
            transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            margin-bottom: -2px;
        } 

        .staf-card:hover .avatar-box { 
            transform: scale(1.05); 
            border-color: var(--primary-light); 
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(255,255,255,0.05));
        }

        /* Foto Benar-benar Keluar saat Hover */
        .staf-card:hover .avatar-box img { 
            transform: scale(1.3) translateY(-15px); 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
        }
        
        .staf-name { font-weight: 900; font-size: 1.1rem; color: var(--text-main); text-transform: uppercase; letter-spacing: -0.5px; }
        .staf-role { font-size: 0.7rem; font-weight: 800; opacity: 0.5; margin-top: 4px; }
        
        /* Riwayat Visual */
        .history-list { border-top: 1.5px solid var(--glass-border); padding-top: 18px; display: flex; flex-direction: column; gap: 15px; }
        .history-row { background: rgba(255,255,255,0.03); border-radius: 24px; padding: 18px; transition: 0.3s; }
        .history-row:hover { background: rgba(255,255,255,0.06); }
        
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-badge { padding: 6px 14px; border-radius: 12px; font-size: 0.6rem; font-weight: 900; color: white; text-transform: uppercase; }
        .score-label { background: rgba(249, 115, 22, 0.15); padding: 5px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 900; color: var(--accent); }

        /* Triple Visual Grid (No-Crop) */
        .triple-visual { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; overflow: visible; }
        .v-box { aspect-ratio: 1; border-radius: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: zoom-in; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }
        .v-box:hover { transform: scale(1.2) translateY(-10px); z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border-color: var(--primary-light); }
        .v-box img { width: 100%; height: 100%; object-fit: cover; }
        .v-box span { font-size: 0.45rem; font-weight: 900; margin-top: 5px; opacity: 0.5; text-transform: uppercase; }
        .v-box.map-btn { background: #e0f2fe; color: #0369a1; }

        .no-data { text-align: center; padding: 30px; font-size: 0.75rem; font-weight: 800; opacity: 0.3; text-transform: uppercase; letter-spacing: 1.5px; }

        /* --- DESKTOP PROTECTION --- */
        @media (min-width: 1025px) {
            .bottom-nav { display: none !important; }
        }

        /* --- MOBILE REFINEMENT --- */
        @media (max-width: 1024px) {
            #master-sidebar { display: none; }
            #main-content { margin-left: 0; padding: 25px 0.5rem 120px 0.5rem; }
            .bottom-nav { display: flex; position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; background: rgba(15, 23, 42, 0.95); border-radius: 22px; justify-content: space-around; align-items: center; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
            .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 800; gap: 5px; }
            .nav-item.active { color: var(--accent); }
            .fab { background: var(--accent-gradient); width: 55px; height: 55px; border-radius: 18px; margin-top: -40px; border: 5px solid var(--bg-body); display: flex; align-items: center; justify-content: center; color: white; }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="fixed-bg"></div>

    <!-- SIDEBAR MASTER -->
    <aside id="master-sidebar">
        <div class="brand">
            <img src="" class="main-logo-src" onerror="this.src='https://placehold.co/50x50?text=Logo'">
            <div><h1 style="font-size:1.1rem; font-weight:900;">SIM PUSDA</h1><p style="font-size:0.6rem; color:var(--accent); font-weight:800;">Bondoyudo Baru</p></div>
        </div>
        <nav class="nav-items">
            <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="scan-face"></i> E-Presensi</a>
            <a href="wilayah.html" class="nav-link"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>
        <div class="sidebar-footer">
            <div id="clockSidebar">00:00:00</div>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Dark Mode</button>
        </div>
    </aside>

    <main id="main-content">
        <div class="header-box">
            <div class="accent-bar"></div>
            <h2>LIVE <span>PRESENSI</span></h2>
        </div>

        <!-- STATS -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><span class="stat-val" id="valHadir" style="color:var(--success)">0</span><span class="stat-lbl">Hadir</span></div>
            <div class="stat-card"><span class="stat-val" id="valPulang" style="color:var(--primary-light)">0</span><span class="stat-lbl">Pulang</span></div>
            <div class="stat-card"><span class="stat-val" id="valIzin" style="color:var(--toska)">0</span><span class="stat-lbl">Izin/Sakit</span></div>
            <div class="stat-card"><span class="stat-val" id="valBelum" style="color:#94a3b8">0</span><span class="stat-lbl">Belum</span></div>
        </div>

        <!-- FILTERS -->
        <div class="filter-section">
            <div class="search-wrapper">
                <input type="text" id="liveSearch" placeholder="Cari Nama Pegawai..." oninput="renderCards()">
                <button class="mic-btn" id="micBtn" onclick="speechToText()"><i data-lucide="mic"></i></button>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <select id="filterWilayah" onchange="renderCards()">
                    <option value="ALL">SEMUA WILAYAH</option>
                    <option value="Bangorejo">BANGOREJO</option>
                    <option value="Cluring">CLURING</option>
                    <option value="Pesanggaran">PESANGGARAN</option>
                    <option value="Porolinggo">POROLINGGO</option>
                </select>
            </div>
        </div>

        <div class="live-grid" id="stafContainer">
            <!-- Render via JS -->
        </div>
    </main>

    <!-- MOBILE NAV (Hidden on Desktop) -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="raport.html" class="nav-item"><i data-lucide="file-text"></i><span>Raport</span></a>
        <a href="presensi.html" class="nav-item"><div class="fab"><i data-lucide="scan-face" color="white"></i></div></a>
        <a href="wilayah.html" class="nav-item"><i data-lucide="map"></i><span>Wilayah</span></a>
        <a href="admin.html" class="nav-item"><i data-lucide="user-cog"></i><span>Admin</span></a>
    </nav>

    <canvas id="wmCanvas" style="display:none;"></canvas>

    <script>
        window.onload = async () => {
            lucide.createIcons();
            initTheme();
            initClock();
            await fetchLiveData();
        };

        async function fetchLiveData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const result = await res.json();
                if (result.status === 'success') {
                    window.appData = result;
                    updateLogo();
                    renderCards();
                }
            } catch (e) { console.error("Live Sync Failure"); }
        }

        function updateLogo() {
            const logo = window.appData.config.Logo || FALLBACK_LOGO;
            document.querySelectorAll('.main-logo-src').forEach(el => el.src = logo);
        }

        function calculatePoin(log) {
            if (log.Nilai) return parseInt(log.Nilai);
            const ts = new Date(log.Timestamp);
            const timeNum = ts.getHours() + (ts.getMinutes()/60);
            if (['Hadir', 'Dinas'].includes(log.Status)) return timeNum <= 7.66 ? 50 : (timeNum <= 8 ? 40 : 25);
            if (log.Status === 'Pulang') return 50;
            if (log.Status === 'Margin Error') return 10;
            return 0;
        }

        function getStatusColor(s) {
            const map = { 'Hadir': 'var(--success)', 'Pulang': 'var(--primary-light)', 'Margin Error': 'var(--pink)', 'Sakit': 'var(--warning)', 'Izin': 'var(--toska)', 'Dinas': 'var(--purple)' };
            return map[s] || '#94a3b8';
        }

        function renderCards() {
            const container = document.getElementById('stafContainer');
            const query = document.getElementById('liveSearch').value.toLowerCase();
            const wilayah = document.getElementById('filterWilayah').value;
            const today = new Date().toISOString().split('T')[0];
            
            const allUsers = [...(window.appData.pegawai || []), ...(window.appData.korlap || [])];
            const logs = (window.appData.presensi || []).filter(p => p.Timestamp && p.Timestamp.includes(today));

            const filtered = allUsers.filter(u => {
                const matchName = u.Nama.toLowerCase().includes(query);
                const matchWil = wilayah === 'ALL' || u.Wilayah === wilayah;
                return matchName && matchWil;
            });

            let c_hadir = 0, c_pulang = 0, c_izin = 0, c_belum = 0;

            container.innerHTML = filtered.map(u => {
                const userLogs = logs.filter(l => String(l.ID_Pegawai) === String(u.ID));
                
                if(userLogs.length === 0) c_belum++;
                else {
                    if(userLogs.some(l => l.Status === 'Pulang')) c_pulang++;
                    else if(userLogs.some(l => ['Sakit', 'Izin'].includes(l.Status))) c_izin++;
                    else c_hadir++;
                }

                return `
                <div class="staf-card fade-in">
                    <div class="card-top">
                        <div class="avatar-container">
                            <div class="avatar-decoration"></div>
                            <div class="avatar-box">
                                <img src="${u.Link_Foto_Profile || ''}" onerror="this.src='https://placehold.co/100x130?text=?'">
                            </div>
                        </div>
                        <div style="flex:1;">
                            <div class="staf-name">${u.Nama}</div>
                            <div class="staf-role">${u.Jabatan} • WIL. ${u.Wilayah}</div>
                        </div>
                    </div>
                    
                    <div class="history-list">
                        ${userLogs.length > 0 ? userLogs.map(l => {
                            const pts = calculatePoin(l);
                            return `
                            <div class="history-row">
                                <div class="row-header">
                                    <span class="status-badge" style="background:${getStatusColor(l.Status)}">${l.Status}</span>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <span class="score-label">+${pts} PTS</span>
                                        <span style="font-size:0.6rem; font-weight:800; opacity:0.5;">${l.Timestamp.split(' ')[1] || ''}</span>
                                    </div>
                                </div>
                                <div class="triple-visual">
                                    <div class="v-box" onclick="window.open('${l.Foto_Selfie}')">${l.Foto_Selfie ? `<img src="${l.Foto_Selfie}">` : '<i data-lucide="camera" size="14"></i><span>SELFIE</span>'}</div>
                                    <div class="v-box" onclick="window.open('${l.Foto_Lokasi}')">${l.Foto_Lokasi ? `<img src="${l.Foto_Lokasi}">` : '<i data-lucide="image" size="14"></i><span>KERJA</span>'}</div>
                                    <div class="v-box map-btn" onclick="window.open('https://www.google.com/maps?q=${l.GPS}')"><i data-lucide="map-pin" size="14"></i><span>MAPS</span></div>
                                </div>
                            </div>`;
                        }).join('') : '<div class="no-data">BELUM ADA ABSENSI HARI INI</div>'}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('valHadir').innerText = c_hadir;
            document.getElementById('valPulang').innerText = c_pulang;
            document.getElementById('valIzin').innerText = c_izin;
            document.getElementById('valBelum').innerText = c_belum;

            lucide.createIcons();
        }

        function speechToText() {
            if (!('webkitSpeechRecognition' in window)) return;
            const rec = new webkitSpeechRecognition();
            const btn = document.getElementById('micBtn');
            rec.lang = 'id-ID';
            rec.onstart = () => btn.classList.add('listening');
            rec.onresult = (e) => { document.getElementById('liveSearch').value = e.results[0][0].transcript; renderCards(); };
            rec.onend = () => btn.classList.remove('listening');
            rec.start();
        }

        function initClock() { setInterval(() => { const el = document.getElementById('clockSidebar'); if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000); }
        
        function initTheme() { 
            const isLight = localStorage.getItem('theme') === 'light'; 
            if(isLight) document.body.classList.add('light-theme'); 
            updateThemeIcons(isLight); 
        }

        function toggleTheme() { 
            const isLight = document.body.classList.toggle('light-theme'); 
            localStorage.setItem('theme', isLight ? 'light' : 'dark'); 
            updateThemeIcons(isLight); 
        }

        function updateThemeIcons(isLight) {
            const btn = document.getElementById('themeBtn');
            if (btn) btn.innerText = isLight ? "Light Mode" : "Dark Mode";
        }
    </script>
</body>
</html>
