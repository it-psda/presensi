        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7DfBiDFB3P3as40f1__ZglPNffg_Pcdw",
            authDomain: "sim-pusda-master.firebaseapp.com",
            projectId: "sim-pusda-master",
            storageBucket: "sim-pusda-master.firebasestorage.app",
            messagingSenderId: "606502874855",
            appId: "1:606502874855:web:1b53b4f69f21049e7cbc42",
            measurementId: "G-0BPH99F48P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Global Accessor with safety
        window.raportFB = {
            load: async () => {
                try {
                    if (!auth.currentUser) await signInAnonymously(auth);
                    const docRef = doc(db, 'artifacts', 'sim-pusda-wsbb', 'public', 'data', 'raport_cache');
                    const docSnap = await getDoc(docRef);
                    return docSnap.exists() ? docSnap.data() : null;
                } catch (e) { return null; }
            },
            save: async (data) => {
                try {
                    const docRef = doc(db, 'artifacts', 'sim-pusda-wsbb', 'public', 'data', 'raport_cache');
                    await setDoc(docRef, { ...data, lastSync: new Date().toISOString() });
                } catch (e) { }
            }
        };
        // Signal that Firebase is ready
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF7MP60nTfLmnA7_GhUedzAl58I51kfJmk_xePBhgVxVHaLtce51aBfCuSskPP67ym/exec";
        const FALLBACK_LOGO = "https://lh3.googleusercontent.com/d/1VYrfN1EG20Enf74vSyw1dGdskFujX8_r";
        window.appData = { config: {}, pegawai: [], korlap: [], presensi: [], isLoaded: false };
        let currentView = 'grid';

        window.onload = async () => {
            initTheme(); initClock();
            const today = new Date().toISOString().split('T')[0];
            const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('reportStart').value = firstDay;
            document.getElementById('reportEnd').value = today;

            // Wait for Firebase module to be ready if it's there
            window.addEventListener('firebaseReady', async () => {
                if (window.raportFB) {
                    const fb = await window.raportFB.load();
                    if (fb && !window.appData.isLoaded) { 
                        window.appData = fb; window.appData.isLoaded = true; 
                        applyGlobalUI(); generateReport(); 
                    }
                }
            });

            // Initial safe check for Firebase if it loaded lightning fast
            if (window.raportFB) {
                const fb = await window.raportFB.load();
                if (fb) { window.appData = fb; window.appData.isLoaded = true; applyGlobalUI(); generateReport(); }
            }

            // Fresh Fetch from GAS
            await fetchDataFromCloud();
        };

        async function fetchDataFromCloud() {
            try {
                // Use a non-blocking fetch to prevent global error overlays if network glitches
                const response = await fetch(`${SCRIPT_URL}?action=getDashboardData`).catch(() => null);
                if (!response) throw new Error("Net Error");
                
                const result = await response.json();
                if (result.status === 'success') {
                    window.appData = result; window.appData.isLoaded = true;
                    applyGlobalUI(); generateReport();
                    if (window.raportFB) window.raportFB.save(result);
                }
            } catch (e) { console.warn("Cloud Sync Failed"); }
        }

        function calculateStats(pegID, start, end) {
            const logs = (window.appData.presensi || []).filter(l => {
                const ts = l.Timestamp ? l.Timestamp.split(' ')[0] : '';
                return String(l.ID_Pegawai) === String(pegID) && ts >= start && ts <= end;
            });
            const dailyLogs = {};
            logs.forEach(l => { const d = l.Timestamp.split(' ')[0]; if(!dailyLogs[d]) dailyLogs[d] = []; dailyLogs[d].push(l); });
            let hadirCount = 0, pulangCount = 0, totalTelat = 0, izinSakit = 0, bonusWeekend = 0, totalPoin = 0;
            Object.keys(dailyLogs).forEach(date => {
                const dayLogs = dailyLogs[date];
                const dayObj = new Date(date);
                const isWeekend = (dayObj.getDay() === 0 || dayObj.getDay() === 6);
                let dayHadir = null, dayPulang = null;
                dayLogs.forEach(l => {
                    if (l.Status === 'Hadir') dayHadir = l;
                    else if (l.Status === 'Pulang') dayPulang = l;
                    else if (['Sakit', 'Izin'].includes(l.Status)) izinSakit++;
                });
                if (dayHadir) {
                    const pts = Number(dayHadir.Nilai) || 0; totalPoin += pts;
                    if (pts < 50) totalTelat++;
                    if (isWeekend) bonusWeekend++; else hadirCount++;
                }
                if (dayPulang) { totalPoin += Number(dayPulang.Nilai) || 0; pulangCount++; }
            });
            const workDays = countWorkDays(start, end);
            const score = Math.min(100, Math.round((totalPoin / (workDays * 100)) * 100));
            let grade = score >= 85 ? 'A' : (score >= 70 ? 'B' : (score >= 50 ? 'C' : 'D'));
            let color = score >= 85 ? 'var(--success)' : (score >= 70 ? 'var(--primary-light)' : (score >= 50 ? 'var(--warning)' : 'var(--danger)'));
            return { hadirCount, pulangCount, totalTelat, izinSakit, bonusWeekend, score, grade, color };
        }

        function generateReport() {
            if (!window.appData.isLoaded) return;
            const start = document.getElementById('reportStart').value;
            const end = document.getElementById('reportEnd').value;
            const query = document.getElementById('reportSearch').value.toLowerCase();
            const wilayah = document.getElementById('reportWilayah').value;
            const allUsers = [...(window.appData.pegawai || []), ...(window.appData.korlap || [])];
            
            const results = allUsers.map(p => {
                const stats = calculateStats(p.ID, start, end);
                return { ...p, stats };
            }).filter(p => {
                const matchName = p.Nama.toLowerCase().includes(query) || String(p.ID).includes(query);
                const matchWil = wilayah === 'ALL' || p.Wilayah === wilayah;
                return matchName && matchWil;
            });

            results.sort((a, b) => b.stats.score - a.stats.score);

            document.getElementById('raportTableBody').innerHTML = results.map((p, i) => `
                <tr class="fade-in">
                    <td>${i+1}</td>
                    <td><img src="${p.Link_Foto_Profile || ''}" style="width:40px;height:55px;object-fit:cover;border-radius:8px;" onerror="this.src='https://placehold.co/100x130?text=?'"></td>
                    <td style="text-align:left"><div style="font-weight:900;">${p.Nama}</div><div style="font-size:0.6rem; opacity:0.6">${p.Jabatan}</div></td>
                    <td>${p.stats.hadirCount}</td><td>${p.stats.pulangCount}</td><td>${p.stats.totalTelat}</td><td>${p.stats.izinSakit}</td><td>${p.stats.bonusWeekend}</td><td style="font-weight:900;color:${p.stats.color}">${p.stats.score}</td>
                    <td><span style="background:${p.stats.color};color:white;padding:4px 8px;border-radius:6px;font-weight:900">${p.stats.grade}</span></td>
                </tr>`).join('');

            document.getElementById('gridView').innerHTML = results.map(p => `
                <div class="raport-card fade-in">
                    <div class="grade-badge" style="background:${p.stats.color}">${p.stats.grade}</div>
                    <div class="card-top">
                        <div class="card-avatar-stage"><div class="avatar-box"></div><img src="${p.Link_Foto_Profile || ''}" class="card-avatar" onerror="this.src='https://placehold.co/100x130?text=?'"></div>
                        <div style="flex:1;"><div style="font-weight:900; text-transform:uppercase; font-size:0.9rem; line-height:1.2;">${p.Nama}</div><div style="font-size:0.6rem; opacity:0.6; font-weight:800; margin-top:4px;">${p.Jabatan} • WIL. ${p.Wilayah}</div></div>
                    </div>
                    <div class="card-stats-grid">
                        <div class="card-stat-item"><span class="card-stat-val">${p.stats.hadirCount}</span><span class="card-stat-lbl">Hadir</span></div>
                        <div class="card-stat-item"><span class="card-stat-val">${p.stats.pulangCount}</span><span class="card-stat-lbl">Pulang</span></div>
                        <div class="card-stat-item"><span class="card-stat-val" style="color:var(--danger)">${p.stats.totalTelat}</span><span class="card-stat-lbl">Telat</span></div>
                        <div class="card-stat-item"><span class="card-stat-val" style="color:var(--warning)">${p.stats.izinSakit}</span><span class="card-stat-lbl">Izin</span></div>
                    </div>
                    <div class="card-footer">
                        <div><span style="font-size:0.45rem; font-weight:800; opacity:0.4; text-transform:uppercase; display:block;">Quickresponse</span><span style="font-weight:900; color:var(--success); font-size:0.9rem;">+${p.stats.bonusWeekend}</span></div>
                        <div style="text-align:right;"><span style="font-size:0.45rem; font-weight:800; opacity:0.4; text-transform:uppercase; display:block;">Score</span><div style="font-weight:900; font-size:1.8rem; color:${p.stats.color}; line-height:1;">${p.stats.score}</div></div>
                    </div>
                </div>`).join('');

            updateSummary(results);
            lucide.createIcons();
        }

        function countWorkDays(startStr, endStr) {
            let start = new Date(startStr); let end = new Date(endStr);
            let count = 0; let current = new Date(start);
            while (current <= end) {
                let day = current.getDay();
                if (day !== 0 && day !== 6) count++; 
                current.setDate(current.getDate() + 1);
            }
            return count > 0 ? count : 1;
        }

        function updateSummary(results) {
            const start = document.getElementById('reportStart').value;
            const end = document.getElementById('reportEnd').value;
            document.getElementById('valEffDays').innerText = countWorkDays(start, end) + " Hari";
            document.getElementById('valTotalPeg').innerText = results.length;
            const avg = results.length > 0 ? Math.round(results.reduce((acc, r) => acc + r.stats.score, 0) / results.length) : 0;
            document.getElementById('valAvgScore').innerText = avg;
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('btnList').classList.toggle('active', view === 'list');
            document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
            document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('gridView').style.display = view === 'grid' ? 'grid' : 'none';
            generateReport();
        }

        function speechToText(id, btn) {
            if (!('webkitSpeechRecognition' in window)) return;
            const rec = new webkitSpeechRecognition(); rec.lang = 'id-ID';
            rec.onstart = () => btn.classList.add('listening');
            rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; generateReport(); };
            rec.onend = () => btn.classList.remove('listening');
            rec.start();
        }

        function applyGlobalUI() {
            const logo = window.appData.config?.Logo || FALLBACK_LOGO;
            document.querySelectorAll('.main-logo-src').forEach(el => el.src = logo);
            lucide.createIcons();
        }

        function initClock() { setInterval(() => { const el = document.getElementById('clockSidebar'); if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000); }
        function initTheme() { if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme'); updateThemeUI(localStorage.getItem('theme') === 'light'); }
        function toggleTheme() { const isLight = document.body.classList.toggle('light-theme'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); updateThemeUI(isLight); }
        function updateThemeUI(isLight) {
            const sI = document.getElementById('sidebarThemeIcon'), mI = document.getElementById('mobileThemeIcon'), lbl = document.getElementById('themeLabel');
            if (mI) mI.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            if (sI) sI.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            if (lbl) lbl.innerText = isLight ? "LIGHT MODE" : "DARK MODE";
            lucide.createIcons();
        }
    </script>
</body>
</html>
