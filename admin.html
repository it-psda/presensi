<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel - SIM UPT PUSDA</title>
    
    <!-- Meta untuk Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Library Ikon Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link ke File CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <style>
        /* Modern UI Tweaks - Anti Tumpang Tindih */
        :root {
            --glass-strong: rgba(15, 23, 42, 0.9);
            --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --sidebar-z: 1000;
            --modal-z: 2000;
            --toggle-z: 1500;
        }

        .hidden { display: none !important; }
        .rounded-3xl { border-radius: 32px !important; }
        
        /* Sidebar Fix */
        .sidebar { 
            background: rgba(15, 23, 42, 0.98); 
            z-index: var(--sidebar-z);
        }

        /* Konten Utama Fix Margin agar tidak tertutup sidebar */
        .main-content {
            margin-left: calc(var(--sidebar-width) + 40px);
            transition: all 0.3s ease;
        }

        /* Login Card Premium & Centering */
        #loginArea {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 20px;
        }

        #loginArea .login-card {
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(40px);
            padding: 50px 40px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Table Responsive Wrapper */
        .table-wrapper {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 850px; }
        th { 
            background: rgba(255,255,255,0.03); 
            padding: 20px; 
            font-size: 0.7rem; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            color: var(--accent);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
        }
        td { 
            padding: 18px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            vertical-align: middle;
        }

        /* Action Buttons styling */
        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .btn-reset { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .btn-edit:hover, .btn-reset:hover { transform: scale(1.1); }

        /* Modal Stacking Fix */
        .modal-admin {
            position: fixed;
            inset: 0;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.85);
            z-index: var(--modal-z);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-admin.show { display: flex; }

        .theme-toggle-mobile {
            z-index: var(--toggle-z);
        }

        @media (max-width: 1024px) {
            .main-content { margin-left: 0; padding: 20px 15px 120px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="fixed-bg"></div>

    <!-- TOGGLE THEME MOBILE -->
    <div class="theme-toggle-mobile rounded-2xl" onclick="toggleTheme()" style="width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;">
        <i data-lucide="sun-moon"></i>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <!-- Logo dengan Fallback Otomatis -->
            <img src="https://z-cdn-media.chatglm.cn/files/0f622017-3978-4699-8e99-bfc963a4d2e9.png?auth_key=1867236411-acaa4dc359f04f54b59d66be1b739ee8-0-61299f9b6ef2dc1a86a21dccfe1cec7d" id="sidebarLogo" alt="Logo" onerror="this.src='https://placehold.co/100x100?text=LOGO'">
            <div>
                <h1>E-PUSDA</h1>
                <p>Bondoyudo Baru</p>
            </div>
        </div>

        <nav class="nav-items">
            <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="scan-face"></i> E-Presensi</a>
            <a href="wilayah.html" class="nav-link"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link active"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>

        <div class="sidebar-footer rounded-3xl" style="padding: 20px; text-align: center;">
            <div id="clockSidebar" style="font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; color: var(--accent);">00:00:00</div>
            <button class="btn btn-primary rounded-2xl" onclick="toggleTheme()" style="width: 100%; padding: 12px; font-weight: 800; font-size: 0.75rem;">
                TEMA
            </button>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
        
        <!-- LOGIN AREA -->
        <div id="loginArea" class="fade-in">
            <div class="login-card rounded-3xl">
                <div style="width: 70px; height: 70px; background: rgba(249, 115, 22, 0.15); color: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                    <i data-lucide="lock" size="32"></i>
                </div>
                <h2 style="margin-bottom: 10px; font-weight: 800; font-size: 1.5rem;">Akses Administrator</h2>
                <p style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 35px;">Gunakan kata sandi Master untuk mengelola basis data Cloud UPT PUSDA.</p>
                
                <input type="password" id="pass" placeholder="••••••••" style="text-align: center; font-size: 1.2rem; letter-spacing: 5px; padding: 20px; margin-bottom: 30px; border-radius: 20px !important;">
                
                <button class="btn btn-primary rounded-2xl" onclick="login()" style="width: 100%; padding: 20px; font-size: 1rem; font-weight: 800; background: var(--accent-gradient);">
                    MASUK PANEL <i data-lucide="arrow-right" size="20" style="margin-left: 10px;"></i>
                </button>
            </div>
        </div>

        <!-- PANEL CONTENT (Hanya tampil setelah login) -->
        <div id="adminContent" class="hidden">
            <div style="display: flex; flex-direction: column; gap: 25px; margin-bottom: 35px;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div style="width: 6px; height: 28px; background: var(--accent); border-radius: 3px;"></div>
                        <h2 style="font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px;">Database Cloud</h2>
                    </div>
                    <button class="btn btn-primary rounded-xl" onclick="openAddModal()" style="padding: 14px 24px; font-size: 0.85rem; background: var(--accent-gradient);">
                        <i data-lucide="plus-circle" size="18"></i> TAMBAH
                    </button>
                </div>

                <!-- Tab Selector -->
                <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px;">
                    <div id="tabPeg" class="tab-btn active" onclick="switchAdminTab('PEG')">PEGAWAI</div>
                    <div id="tabWil" class="tab-btn" onclick="switchAdminTab('WIL')">KORLAP</div>
                </div>
            </div>

            <!-- Tabel Data -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="padding-left: 30px;">ID</th>
                            <th>PROFIL</th>
                            <th>NAMA LENGKAP</th>
                            <th>JABATAN / WILAYAH</th>
                            <th>STATUS</th>
                            <th style="text-align: center; padding-right: 30px;">KONTROL</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Konten dirender oleh assets/js/main.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL EDITOR DATA -->
    <div id="modalEditor" class="modal-admin">
        <div class="modal-content-admin rounded-3xl">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 id="modalTitle" style="font-weight: 800; font-size: 1.3rem;">Editor Data Cloud</h3>
                <div onclick="closeModalAdmin()" style="cursor: pointer; opacity: 0.5; padding: 5px;"><i data-lucide="x"></i></div>
            </div>
            
            <form id="formAdmin" onsubmit="event.preventDefault(); saveAdminData();">
                <div style="display: flex; gap: 20px; margin-bottom: 25px; align-items: center; background: rgba(0,0,0,0.25); padding: 20px; border-radius: 24px;">
                    <img id="formPreview" src="https://placehold.co/100x130?text=User" style="width: 80px; height: 110px; border-radius: 14px; object-fit: cover; border: 2px solid var(--glass-border);">
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; display: block; opacity: 0.6;">FOTO PROFILE</label>
                        <input type="file" id="fileFoto" accept="image/*" style="display: none;" onchange="handleAdminPhoto(this)">
                        <button type="button" class="btn" onclick="document.getElementById('fileFoto').click()" style="background: var(--primary); color: white; width: 100%; font-size: 0.75rem; padding: 12px; font-weight: 800;">
                            UNGGAH FOTO BARU
                        </button>
                        <input type="text" id="formLinkFoto" placeholder="Atau tempel link foto..." style="margin-top: 10px; font-size: 0.75rem;">
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label>ID Sistem</label>
                        <input type="text" id="formID" required>
                    </div>
                    <div>
                        <label>Status</label>
                        <select id="formStatus">
                            <option value="Aktif">Aktif</option>
                            <option value="Non-Aktif">Non-Aktif</option>
                        </select>
                    </div>
                    <div style="grid-column: span 2;">
                        <label>Nama Lengkap</label>
                        <input type="text" id="formNama" required>
                    </div>
                    <div>
                        <label>Jabatan</label>
                        <input type="text" id="formJabatan" required>
                    </div>
                    <div>
                        <label>Wilayah</label>
                        <select id="formWilayah">
                            <option value="Bangorejo">Bangorejo</option>
                            <option value="Cluring">Cluring</option>
                            <option value="Pesanggaran">Pesanggaran</option>
                            <option value="Porolinggo">Porolinggo</option>
                            <option value="Umum">Umum</option>
                        </select>
                    </div>
                    <div>
                        <label>WhatsApp</label>
                        <input type="text" id="formHP" placeholder="628xxxx">
                    </div>
                    <div>
                        <label>Koordinat</label>
                        <input type="text" id="formLokasi" placeholder="-8.xxx, 114.xxx">
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button type="button" class="btn" onclick="closeModalAdmin()" style="flex: 1; background: rgba(255,255,255,0.05); color: white;">BATAL</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2; background: var(--accent-gradient);">SIMPAN DATA</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT UTAMA -->
    <script src="assets/js/main.js"></script>
    <script>
        let currentAdminTab = 'PEG';

        function switchAdminTab(type) {
            currentAdminTab = type;
            document.getElementById('tabPeg').classList.toggle('active', type === 'PEG');
            document.getElementById('tabWil').classList.toggle('active', type === 'WIL');
            renderAdminTable();
        }

        function renderAdminTable() {
            const container = document.getElementById('tableBody');
            if (!window.appData.isLoaded) {
                container.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:80px; opacity:0.3;">Menghubungkan ke Cloud...</td></tr>`;
                return;
            }

            const data = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            
            if (!data || data.length === 0) {
                container.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:80px; opacity:0.3;">Tabel ${currentAdminTab} kosong.</td></tr>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <tr>
                    <td style="font-weight:800; font-size:0.8rem; opacity:0.4; padding-left:30px;">#${p.ID}</td>
                    <td>
                        <img src="${p.Link_Foto_Profile || 'https://placehold.co/60x80?text=?'}" 
                             style="width:44px; height:60px; border-radius:10px; object-fit:cover; border:1px solid var(--glass-border);"
                             onerror="this.src='https://placehold.co/60x80?text=Error'">
                    </td>
                    <td>
                        <div style="font-weight:800; font-size:0.95rem;">${p.Nama}</div>
                        <div style="font-size:0.7rem; opacity:0.5;">NIP: ${p.ID}</div>
                    </td>
                    <td>
                        <div style="font-size:0.85rem; font-weight:700; color:var(--accent);">${p.Jabatan}</div>
                        <div style="font-size:0.7rem; opacity:0.6;">WILAYAH ${p.Wilayah?.toUpperCase()}</div>
                    </td>
                    <td>
                        <span style="background:${p.Status === 'Aktif' ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'}; 
                                     color:${p.Status === 'Aktif' ? '#10b981' : '#ef4444'}; 
                                     padding:6px 12px; border-radius:10px; font-size:0.7rem; font-weight:800;">
                            ${p.Status || 'Aktif'}
                        </span>
                    </td>
                    <td style="padding-right:30px; text-align: center;">
                        <div style="display:flex; gap:8px; justify-content:center;">
                            <button class="action-btn btn-reset" title="Reset Absen Hari Ini" onclick="resetTodayPresence('${p.ID}')">
                                <i data-lucide="rotate-ccw" size="18"></i>
                            </button>
                            <button class="action-btn btn-edit" title="Edit Data" onclick="editData('${p.ID}')">
                                <i data-lucide="edit-3" size="18"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah " + (currentAdminTab === 'PEG' ? "Pegawai Baru" : "Korlap Baru");
            document.getElementById('formAdmin').reset();
            document.getElementById('formPreview').src = "https://placehold.co/100x130?text=Profil";
            document.getElementById('modalEditor').classList.add('show');
            lucide.createIcons();
        }

        function editData(id) {
            const list = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            const p = list.find(x => x.ID == id);
            if (p) {
                document.getElementById('modalTitle').innerText = "Edit " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
                document.getElementById('formID').value = p.ID || '';
                document.getElementById('formNama').value = p.Nama || '';
                document.getElementById('formJabatan').value = p.Jabatan || '';
                document.getElementById('formWilayah').value = p.Wilayah || '';
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                document.getElementById('formHP').value = p.NoHP || '';
                document.getElementById('formLokasi').value = p.Lokasi_Kerja || '';
                document.getElementById('formLinkFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || "https://placehold.co/100x130?text=User";
                document.getElementById('modalEditor').classList.add('show');
                lucide.createIcons();
            }
        }

        function closeModalAdmin() { document.getElementById('modalEditor').classList.remove('show'); }

        function handleAdminPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('formPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
