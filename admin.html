<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel - SIM UPT PUSDA</title>
    
    <!-- Meta untuk Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Library Ikon Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link ke File CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <style>
        /* Modern UI Tweaks & Theme Adaptability */
        :root {
            --sidebar-width: 280px;
            --sidebar-z: 1000;
            --modal-z: 2000;
            --toggle-z: 1500;
            --transition-speed: 0.4s;
            --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        /* MODE TERANG PREMIUM */
        body.light-theme {
            --bg-panel: #f8fafc;
            --card-bg: #ffffff;
            --card-border: rgba(30, 41, 59, 0.08);
            --text-main: #0f172a;
            --text-dim: #475569;
            --glass-border: rgba(30, 41, 59, 0.1);
            --sidebar-bg: #ffffff;
            --shadow-premium: 0 10px 30px rgba(0, 40, 120, 0.05);
            --input-bg: #f1f5f9;
            --tab-inactive: #f1f5f9;
        }

        /* MODE GELAP (Default) */
        body:not(.light-theme) {
            --bg-panel: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: rgba(248, 250, 252, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-bg: rgba(15, 23, 42, 0.95);
            --shadow-premium: 0 30px 60px rgba(0, 0, 0, 0.4);
            --input-bg: rgba(0, 0, 0, 0.2);
            --tab-inactive: rgba(255, 255, 255, 0.05);
        }

        .hidden { display: none !important; }
        
        /* Bulatan Konsisten */
        .rounded-3xl { border-radius: var(--radius-xl) !important; }
        .rounded-2xl { border-radius: var(--radius-lg) !important; }
        .rounded-xl { border-radius: var(--radius-md) !important; }

        /* Sidebar & Layout Fix */
        .sidebar { background: var(--sidebar-bg); z-index: var(--sidebar-z); border-right: 1px solid var(--glass-border); }
        .main-content {
            margin-left: calc(var(--sidebar-width) + 40px);
            padding: 40px 40px 140px 0;
            transition: all var(--transition-speed) ease;
            min-height: 100vh;
        }

        /* Login Card & Password Box Fix */
        #loginArea { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .login-card {
            max-width: 420px; width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-premium);
            padding: 50px 35px;
            text-align: center;
            border-radius: 35px;
        }
        
        .pass-input-wrapper { position: relative; margin-bottom: 25px; }
        .pass-input-wrapper input {
            text-align: center; font-weight: 800; font-size: 1.2rem;
            letter-spacing: 6px; padding: 18px !important;
            border: 2px solid var(--glass-border) !important;
            transition: 0.3s !important;
            background: var(--input-bg) !important;
            border-radius: var(--radius-lg) !important; /* Konsistensi Sudut */
        }
        .pass-input-wrapper input:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.2) !important;
        }

        /* GRID KARTU PEGAWAI PRO - Responsif Fix */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 22px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-premium);
            position: relative;
            overflow: hidden;
        }
        .admin-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card-img-wrapper {
            position: relative; flex-shrink: 0;
            width: 80px; height: 110px;
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            background: #000;
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { flex: 1; min-width: 0; }
        .card-name { font-weight: 800; font-size: 1.05rem; color: var(--text-main); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-id { font-size: 0.7rem; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; opacity: 0.7; }
        .card-role { 
            font-size: 0.75rem; font-weight: 800; color: var(--accent); 
            display: inline-block; padding: 4px 10px; background: rgba(249, 115, 22, 0.1);
            border-radius: 10px; margin-bottom: 8px;
        }
        .card-region { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Actions styling */
        .card-actions { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid var(--glass-border); padding-top: 12px; }
        .btn-action-small {
            flex: 1; padding: 10px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 0.65rem; font-weight: 800; cursor: pointer; transition: 0.2s;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-main);
        }
        .btn-action-small:hover { background: var(--accent-gradient); color: white; border-color: transparent; }

        /* Status Badge */
        .status-pill {
            position: absolute; top: 15px; right: 15px;
            padding: 4px 10px; border-radius: 8px;
            font-size: 0.55rem; font-weight: 900;
        }
        .status-aktif { background: #10b981; color: white; }
        .status-non { background: #ef4444; color: white; }

        /* Tab Navigation */
        .tab-nav { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-trigger {
            background: var(--tab-inactive); border: 1px solid var(--glass-border);
            padding: 12px 24px; border-radius: 18px;
            font-weight: 800; font-size: 0.75rem; color: var(--text-dim);
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .tab-trigger.active {
            background: var(--accent-gradient); color: white !important; border-color: transparent;
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.2); transform: translateY(-2px);
        }

        /* Modal Layout */
        .modal-card {
            background: var(--bg-panel);
            width: 100%; max-width: 550px;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            padding: 35px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: var(--shadow-premium);
        }

        @media (max-width: 1024px) {
            .main-content { margin-left: 0; padding: 20px 15px 140px; }
            .sidebar { transform: translateX(-110%); }
            .data-grid { grid-template-columns: 1fr; }
        }

        /* Bottom Nav Mobile */
        .bottom-nav {
            display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px;
            background: var(--sidebar-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 0 20px; justify-content: space-between; align-items: center;
            z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        @media (max-width: 1024px) { .bottom-nav { display: flex; } }
        .b-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 800; gap: 4px; }
        .b-nav-item.active { color: var(--accent); }
        .presensi-fab { background: var(--accent-gradient); padding: 12px; border-radius: 18px; margin-top: -40px; border: 4px solid var(--bg-panel); color: white; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        
        /* Input & Select global rounded fix */
        input, select { border-radius: var(--radius-md) !important; }
    </style>
</head>
<body class="dark-theme">

    <!-- TOGGLE THEME MOBILE -->
    <div class="theme-toggle-mobile rounded-2xl" onclick="toggleTheme()" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; z-index: var(--toggle-z); background: var(--sidebar-bg); border: 1px solid var(--glass-border); box-shadow: var(--shadow-premium); cursor: pointer;">

    <!-- KONTEN UTAMA -->
    <main class="main-content">
        
        <!-- AREA LOGIN -->
        <div id="loginArea" class="fade-in">
            <div class="login-card">
                <div style="width: 70px; height: 70px; background: rgba(249, 115, 22, 0.15); color: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                    <i data-lucide="lock" size="36"></i>
                </div>
                <h2 style="margin-bottom: 10px; font-weight: 800; font-size: 1.6rem; color: var(--text-main);">Panel Akses</h2>
                <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 35px;">Masukkan kata sandi master.</p>
                
                <div class="pass-input-wrapper">
                    <input type="password" id="pass" placeholder="••••••••">
                </div>
                
                <button class="btn-premium" onclick="login()" style="width: 100%; background: var(--accent-gradient); color: white; border-radius: 18px !important;">
                    MASUK PANEL <i data-lucide="arrow-right" size="18"></i>
                </button>
            </div>
        </div>

        <!-- AREA DATA ADMIN -->
        <div id="adminContent" class="hidden">
            <div style="display: flex; flex-direction: column; gap: 25px; margin-bottom: 35px;">
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 5px; height: 30px; background: var(--accent); border-radius: 3px;"></div>
                        <h2 style="font-weight: 800; font-size: 1.5rem; color: var(--text-main);">Database Cloud</h2>
                    </div>
                    <button class="btn-premium" onclick="openAddModal()" style="background: var(--accent-gradient); color: white; font-size: 0.8rem; border-radius: 16px !important; padding: 12px 20px;">
                        <i data-lucide="user-plus" size="18"></i> TAMBAH

                </div>

                <div class="tab-nav">
                    <div id="tabPeg" class="tab-trigger active" onclick="switchAdminTab('PEG')">

                    <div id="tabWil" class="tab-trigger" onclick="switchAdminTab('WIL')">

            <!-- Kontainer Kartu Pegawai -->
            <div id="dataContainer" class="data-grid">

            <p style="text-align: center; color: var(--text-dim); font-size: 0.65rem; margin-top: 50px; opacity: 0.5;">

    <!-- MODAL EDITOR DATA -->
    <div id="modalEditor" class="modal-admin">
        <div class="modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 id="modalTitle" style="font-weight: 800; font-size: 1.3rem; color: var(--text-main);">Editor Data</h3>
                <div onclick="closeModalAdmin()" style="cursor: pointer; opacity: 0.5; padding: 5px;"><i data-lucide="x-circle" size="28"></i></div>
            </div>
            
            <form id="formAdmin" onsubmit="event.preventDefault(); saveAdminData();">

                    </div>
                </div>

                        <select id="formWilayah">
                            <option value="Bangorejo">Bangorejo</option>
                            <option value="Cluring">Cluring</option>
                            <option value="Pesanggaran">Pesanggaran</option>
                            <option value="Porolinggo">Porolinggo</option>

                        </select>

    <!-- SCRIPTS -->
    <script src="assets/js/main.js"></script>
    <script>
        let currentAdminTab = 'PEG';

        function switchAdminTab(type) {
            currentAdminTab = type;
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            const targetId = type === 'PEG' ? 'tabPeg' : 'tabWil';
            const targetEl = document.getElementById(targetId);
            if(targetEl) targetEl.classList.add('active');
            renderAdminTable();
        }

        /**
         * Render Kartu Data (Sinkron dengan main.js)
         */
        function renderAdminTable() {
            const container = document.getElementById('dataContainer');
            if (!container) return;
            
            if (!window.appData || !window.appData.isLoaded) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:100px; opacity:0.5;"><i data-lucide="loader-2" class="spin"></i><br>Mengkoneksikan...</div>`;
                lucide.createIcons();
                return;
            }

            const data = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            
            if (!data || data.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:100px; color:var(--text-dim);">Data kosong.</div>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="admin-card">
                    <span class="status-pill ${p.Status === 'Aktif' ? 'status-aktif' : 'status-non'}">
                        ${p.Status || 'Aktif'}
                    </span>
                    <div class="card-img-wrapper">
                        <img src="${p.Link_Foto_Profile || 'https://placehold.co/80x110?text=?'}" 
                             class="card-img" 
                             onerror="this.src='https://placehold.co/80x110?text=Error'">
                    </div>
                    <div class="card-info">
                        <div class="card-name">${p.Nama}</div>
                        <div class="card-id">ID: #${p.ID}</div>
                        <div class="card-role">${p.Jabatan}</div>
                        <div class="card-region">
                            <i data-lucide="map-pin" size="10"></i>
                            WIL. ${p.Wilayah?.toUpperCase()}
                        </div>
                        <div class="card-actions">
                            <button class="btn-action-small" onclick="resetTodayPresence('${p.ID}')">
                                <i data-lucide="rotate-ccw" size="12"></i> RESET
                            </button>
                            <button class="btn-action-small" onclick="editData('${p.ID}')">
                                <i data-lucide="edit-3" size="12"></i> UBAH
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        const checkData = setInterval(() => {
            if(window.appData && window.appData.isLoaded) {
                renderAdminTable();
                clearInterval(checkData);
            }
        }, 800);

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
            document.getElementById('formAdmin').reset();
            document.getElementById('formPreview').src = "https://placehold.co/100x130?text=BARU";
            document.getElementById('modalEditor').classList.add('show');
            lucide.createIcons();
        }

        /**
         * Fungsi Edit Data - Perbaikan Tipe Data ID
         */
        function editData(id) {
            const list = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            // Gunakan .toString() untuk memastikan ID cocok meski bertipe data beda
            const p = list.find(x => x.ID.toString() === id.toString());
            if (p) {
                document.getElementById('modalTitle').innerText = "Edit " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
                document.getElementById('formID').value = p.ID || '';
                document.getElementById('formNama').value = p.Nama || '';
                document.getElementById('formJabatan').value = p.Jabatan || '';
                document.getElementById('formWilayah').value = p.Wilayah || '';
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                document.getElementById('formHP').value = p.NoHP || '';
                document.getElementById('formLokasi').value = p.Lokasi_Kerja || '';
                document.getElementById('formLinkFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || "https://placehold.co/100x130?text=USER";
                document.getElementById('modalEditor').classList.add('show');
                lucide.createIcons();
            }
        }

        function closeModalAdmin() { document.getElementById('modalEditor').classList.remove('show'); }

        function handleAdminPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('formPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function initClock() {
            const el = document.getElementById('clockSidebar');
            if (el) setInterval(() => { el.innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        }
        initClock();
    </script>
</body>
</html>
