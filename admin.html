<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel Master - SIM UPT PUSDA v22.5</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        /**
         * CONFIG & ADMIN ENGINE v22.5 (CONTROL HUB)
         * Feature: Search Filter + Voice Search (Speak to Text) with Pulse Effect.
         * Navigation: Standardized Dashboard -> Wilayah.
         * Modal: Wide Form (0.5rem Padding).
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF7MP60nTfLmnA7_GhUedzAl58I51kfJmk_xePBhgVxVHaLtce51aBfCuSskPP67ym/exec";
        const FALLBACK_LOGO = "https://lh3.googleusercontent.com/d/1VYrfN1EG20Enf74vSyw1dGdskFujX8_r";
        window.appData = window.appData || { pegawai: [], korlap: [], presensi: [], config: {}, isLoaded: false };
        let base64Photo = ""; 
    </script>

    <style>
        /* --- MASTER THEME v22.5 --- */
        :root {
            --primary: #1e3a8a; --primary-light: #3b82f6;
            --accent: #f97316; --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --toska: #06b6d4; --bg-body: #0f172a; --bg-gradient: radial-gradient(circle at top right, #1e40af, #0f172a 60%);
            --text-main: #f8fafc; --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(15px); --card-shadow: 0 20px 50px rgba(0,0,0,0.4);
            --sidebar-width: 280px;
            --input-bg: rgba(0,0,0,0.3);
        }

        body.light-theme {
            --bg-body: #f8fafc; --bg-gradient: radial-gradient(circle at top right, #dbeafe, #f8fafc 70%);
            --text-main: #1e293b; --text-muted: #475569;
            --glass: rgba(255, 255, 255, 0.85); --glass-border: rgba(0, 0, 0, 0.1);
            --card-shadow: 0 15px 35px rgba(30, 41, 59, 0.08);
            --input-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); overflow-x: hidden; display: flex; min-height: 100vh; transition: 0.3s; }
        .fixed-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg-gradient); }

        /* --- SIDEBAR --- */
        #master-sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px 25px; display: flex; flex-direction: column; z-index: 1000; box-shadow: var(--card-shadow); }
        body.light-theme #master-sidebar { background: rgba(255,255,255,0.95); }
        
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .brand img { height: 45px; object-fit: contain; }
        .brand h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.5px; }
        .logo-sim { color: var(--accent); } .logo-pu { color: var(--primary-light); } .logo-sda { color: var(--toska); }

        .nav-items { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { padding: 15px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 600; cursor: pointer; }
        .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); }

        .sidebar-footer { margin-top: auto; padding: 5px; }
        .authority-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px 15px; text-align: center; }
        body.light-theme .authority-box { background: rgba(0,0,0,0.03); }
        .auth-label { font-size: 0.55rem; font-weight: 900; opacity: 0.5; letter-spacing: 1px; display: block; margin-bottom: 10px; text-transform: uppercase; color: var(--text-main); }
        #clockSidebar { font-size: 1.6rem; font-weight: 900; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; }
        
        .theme-btn-sidebar { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-main); font-weight: 800; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        body.light-theme .theme-btn-sidebar { background: #fff; color: #1e293b; border-color: #cbd5e1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- MAIN CONTENT area --- */
        #main-content { flex: 1; margin-left: calc(var(--sidebar-width) + 40px); padding: 40px 2.5rem 120px 2.5rem; min-height: 100vh; position: relative; }
        .header-box { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .accent-bar { width: 7px; height: 35px; background: var(--accent-gradient); border-radius: 4px; }
        .header-box h2 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; color: var(--text-main); }

        /* --- LOGIN DESIGN (CYBER-LOCK) --- */
        #loginArea { max-width: 440px; margin: 100px auto; background: var(--glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 45px; padding: 60px 45px; text-align: center; box-shadow: var(--card-shadow); }
        .login-stage { position: relative; width: 100px; height: 100px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; }
        .login-orbit { position: absolute; inset: 0; border: 2.5px dashed var(--accent); border-radius: 50%; opacity: 0.3; animation: spin 15s linear infinite; }
        .login-lock-box { position: relative; width: 70px; height: 70px; background: var(--accent-gradient); border-radius: 24px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 15px 30px rgba(249,115,22,0.4); z-index: 2; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- FILTER BAR --- */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        .search-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
        .search-wrapper input { width: 100%; height: 52px; padding: 0 60px 0 25px; border-radius: 18px; background: var(--input-bg); border: 1.5px solid var(--glass-border); color: var(--text-main); font-weight: 700; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .search-wrapper input:focus { border-color: var(--accent); }
        
        /* Voice Button Effect */
        .mic-btn-search { position: absolute; right: 8px; width: 40px; height: 40px; background: var(--accent-gradient); border: none; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .mic-btn-search.listening { background: var(--danger) !important; animation: pulse-red 1.2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }

        /* TAB NAV */
        .tab-nav { display: flex; gap: 10px; background: rgba(0,0,0,0.1); padding: 6px; border-radius: 22px; border: 1px solid var(--glass-border); width: fit-content; min-width: 320px; }
        body.light-theme .tab-nav { background: #f1f5f9; }
        .tab-trigger { flex: 1; padding: 12px 20px; text-align: center; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 0.75rem; transition: 0.3s; color: var(--text-muted); }
        .tab-trigger.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border-color: var(--primary-light); box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); }

        /* DATA CARDS */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 25px; }
        .admin-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 40px; padding: 25px; display: grid; grid-template-columns: 100px 1fr 75px; gap: 20px; align-items: flex-start; position: relative; overflow: visible; transition: 0.4s; box-shadow: var(--card-shadow); }
        .admin-card:hover { border-color: var(--primary-light); transform: translateY(-8px); }

        .avatar-area { position: relative; width: 100px; height: 135px; display: flex; align-items: flex-end; justify-content: center; }
        .avatar-frame { position: absolute; bottom: 0; width: 100%; height: 85%; border-radius: 22px; background: rgba(255,255,255,0.05); border: 1.5px solid var(--glass-border); z-index: 1; }
        body.light-theme .avatar-frame { background: #f1f5f9; }
        .avatar-box-img { position: relative; width: 135%; height: auto; max-height: 160px; object-fit: contain; z-index: 10; transform-origin: bottom center; transition: 0.4s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); margin-bottom: -5px; }
        .admin-card:hover .avatar-box-img { transform: scale(1.25) translateY(-15px); }

        .staf-name { font-weight: 900; font-size: 1.1rem; color: var(--text-main); text-transform: uppercase; line-height: 1.1; letter-spacing: -0.5px; }
        .staf-role { font-size: 0.7rem; font-weight: 800; opacity: 0.6; margin-top: 5px; color: var(--text-muted); }
        .staf-wil { font-size: 0.6rem; font-weight: 900; color: var(--accent); background: rgba(249,115,22,0.1); padding: 4px 10px; border-radius: 8px; width: fit-content; margin-top: 8px; text-transform: uppercase; }

        .card-qr-box { width: 75px; height: 75px; background: white; border-radius: 18px; padding: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); align-self: center; }

        .card-actions { grid-column: span 3; display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--glass-border); padding-top: 15px; }
        .btn-act { flex: 1; height: 48px; border-radius: 14px; border: none; font-weight: 900; font-size: 0.7rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .btn-reset { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1.5px solid var(--glass-border); }
        body.light-theme .btn-reset { background: #f1f5f9; color: #1e293b; border-color: #cbd5e1; }
        .btn-edit { background: var(--accent-gradient); color: white; }

        /* --- MODAL EDITOR (WIDE PADDING v22.5) --- */
        .modal-overlay { position: fixed; inset: 0; z-index: 5000; display: none; background: rgba(0,0,0,0.92); backdrop-filter: blur(25px); align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        
        .glass-modal-card { 
            background: var(--bg-body); border: 1px solid var(--glass-border); 
            width: 100%; max-width: 800px; border-radius: 45px; 
            padding: 35px 0.5rem; /* Wide padding horizontal 0.5rem */
            color: var(--text-main); animation: modalPop 0.4s ease; position: relative; 
            max-height: 95vh; overflow-y: auto; box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }
        @keyframes modalPop { from { transform: scale(0.9) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .modal-header { padding: 0 1.5rem 25px 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 1.5rem; }
        
        label { font-size: 0.65rem; font-weight: 900; opacity: 0.7; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px; color: var(--text-main); }
        input, select, textarea { width: 100%; padding: 16px 20px; border-radius: 16px; background: var(--input-bg); border: 1.5px solid var(--glass-border); color: var(--text-main); font-weight: 700; outline: none; transition: 0.3s; font-size: 0.85rem; }
        body.light-theme input, body.light-theme select { border-color: #cbd5e1; }
        input:focus { border-color: var(--accent); }

        /* --- MOBILE PROTECTION & REFINEMENT --- */
        .theme-toggle-mobile { display: none !important; }
        #master-bottom-nav { display: none !important; }

        @media (max-width: 1024px) {
            #master-sidebar { display: none; }
            #main-content { margin-left: 0; padding: 25px 0.5rem 140px 0.5rem; width: 100%; }
            #master-bottom-nav { 
                display: flex !important; position: fixed; bottom: 15px; left: 15px; right: 15px; 
                height: 75px; background: rgba(15, 23, 42, 0.95); border-radius: 22px; 
                justify-content: space-around; align-items: center; z-index: 2000; 
                box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            }
            body.light-theme #master-bottom-nav { background: white; }
            .theme-toggle-mobile { 
                display: flex !important; position: fixed; top: 20px; right: 20px; 
                width: 52px; height: 52px; background: rgba(15, 23, 42, 0.85); 
                border-radius: 16px; z-index: 1001; align-items: center; justify-content: center; 
                cursor: pointer; color: white; box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
            }
            body.light-theme .theme-toggle-mobile { background: white; color: var(--primary); border-color: #cbd5e1; }

            .b-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 800; gap: 5px; }
            .b-nav-item.active { color: var(--accent); }
            .presensi-fab { background: var(--accent-gradient); width: 55px; height: 55px; border-radius: 18px; margin-top: -40px; border: 5px solid var(--bg-body); display: flex; align-items: center; justify-content: center; color: white; }
            
            .data-grid { grid-template-columns: 1fr; }
            .admin-card { grid-template-columns: 85px 1fr 65px; border-radius: 30px; padding: 20px; }
            .form-grid { grid-template-columns: 1fr; padding: 0 1rem; }
            .col-span-mobile { grid-column: span 1 !important; }
            .filter-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
            .tab-nav { min-width: 100%; width: 100%; }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="fixed-bg"></div>
    <div class="theme-toggle-mobile" onclick="toggleTheme()" id="mobileThemeBtn"><i data-lucide="sun" id="mobileThemeIcon"></i></div>

    <!-- SIDEBAR MASTER -->
    <aside id="master-sidebar">

            <img src="" class="main-logo-src" onerror="this.src='https://placehold.co/50x50?text=Logo'">

        </div>
        <nav class="nav-items">

            </div>
        </div>
    </aside>

    <main id="main-content">
        <!-- LOGIN SECTION -->
        <div id="loginArea">
            <div class="login-stage">
                <div class="login-orbit"></div>
                <div class="login-lock-box"><i data-lucide="lock" size="32"></i></div>
            </div>
            <h2 style="font-weight:900; letter-spacing:-1px;">AKSES OTORITAS</h2>
            <p style="opacity:0.6; font-size:0.85rem; margin-bottom:35px;">Panel Kontrol Manajemen SIM PUSDA.</p>
            <input type="password" id="passInput" placeholder="••••••••" style="text-align:center; letter-spacing:5px; font-size:1.2rem; margin-bottom:20px;">
            <button onclick="checkLogin()" class="btn-act btn-edit" style="width:100%; border-radius:24px; font-size:1rem; height:60px;">BUKA PANEL KONTROL</button>
        </div>

        <!-- ADMIN CONTENT -->
        <div id="adminContent" style="display:none;">
            <div class="header-box">
                <div class="accent-bar"></div>
                <h2><span class="logo-sim">CONTROL</span> <span class="logo-pu">CENTER</span></h2>
                <button class="btn-act btn-edit" onclick="openAddModal()" style="width:auto; padding:0 25px; height:52px; margin-left:auto;"><i data-lucide="plus-circle"></i> DATA BARU</button>
            </div>

            <!-- SEARCH & TABS -->
            <div class="filter-bar">
                <div class="search-wrapper">
                    <input type="text" id="adminSearch" placeholder="Cari Nama atau ID Staf..." oninput="renderCards()">
                    <button class="mic-btn-search" id="micAdmin" onclick="speechToText('adminSearch', this)"><i data-lucide="mic"></i></button>
                </div>
                <div class="tab-nav">
                    <div id="tabPEG" class="tab-trigger active" onclick="switchTab('PEG')">PEGAWAI</div>
                    <div id="tabWIL" class="tab-trigger" onclick="switchTab('WIL')">KORLAP</div>
                </div>
            </div>

            <div class="data-grid" id="dataContainer"></div>
        </div>
    </main>

    <!-- MODAL EDITOR -->
    <div id="modalEditor" class="modal-overlay">
        <div class="glass-modal-card">
            <div class="modal-header">
                <div><h3 id="modalTitle" style="font-weight:900; text-transform:uppercase; color:var(--accent); font-size:1.3rem;">EDITOR DATA</h3><p style="font-size:0.6rem; opacity:0.5; font-weight:800; letter-spacing:1px; text-transform:uppercase;">UPT PSDA WS BONDOYUDO BARU</p></div>
                <div onclick="closeModal()" style="cursor:pointer; opacity:0.5;"><i data-lucide="x-circle" size="36"></i></div>
            </div>
            
            <form id="adminForm" class="form-grid">
                <div style="grid-column: span 2; display:flex; gap:25px; align-items:center; background:rgba(255,255,255,0.05); padding:25px; border-radius:30px; border:1.5px solid var(--glass-border);" class="col-span-mobile">
                    <div style="width:100px; height:135px; border-radius:20px; overflow:hidden; background:#000; border:2.5px solid white; flex-shrink:0;"><img id="formPreview" src="https://placehold.co/100x135?text=?" style="width:100%; height:100%; object-fit:contain;"></div>
                    <div style="flex:1;">
                        <label>Foto Profil (URL Link)</label>
                        <input type="text" id="formFoto" placeholder="https://..." oninput="document.getElementById('formPreview').src = this.value">
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button type="button" onclick="document.getElementById('fileUpload').click()" class="btn-act btn-edit" style="height:40px; font-size:0.65rem;">+ UPLOAD FILE</button>
                            <input type="file" id="fileUpload" style="display:none;" accept="image/*" onchange="handleFileSelect(event)">
                        </div>
                    </div>
                </div>
                
                <div><label>ID / NIP Pegawai</label><input type="text" id="formID" placeholder="ID Unik"></div>
                <div><label>Status Keaktifan</label><select id="formStatus"><option value="Aktif">Aktif</option><option value="Non-Aktif">Non-Aktif</option></select></div>
                <div style="grid-column: span 2;" class="col-span-mobile"><label>Nama Lengkap Staf</label><input type="text" id="formNama" placeholder="Nama Tanpa Gelar"></div>
                <div><label>Jabatan / Bidang</label><input type="text" id="formJabatan" placeholder="Contoh: PPA"></div>
                <div><label>Wilayah Kerja</label><select id="formWilayah"><option value="Bangorejo">Bangorejo</option><option value="Cluring">Cluring</option><option value="Pesanggaran">Pesanggaran</option><option value="Porolinggo">Porolinggo</option></select></div>
                <div><label>No. WhatsApp</label><input type="text" id="formHP" placeholder="08xxxx"></div>
                <div><label>Sektor Area / Lokasi</label><input type="text" id="formLokasi" placeholder="Lokasi Penugasan"></div>
                
                <button type="button" id="saveBtn" onclick="saveData()" class="btn-act btn-edit" style="grid-column: span 2; margin-top:15px; font-size:0.9rem;" class="col-span-mobile">SIMPAN DATA KE CLOUD</button>
            </form>
        </div>

        <a href="index.html" class="b-nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="raport.html" class="b-nav-item"><i data-lucide="file-text"></i><span>Raport</span></a>
        <div class="presensi-fab" onclick="location.href='presensi.html'"><i data-lucide="fingerprint" color="white" size="30"></i></div>
        <a href="livepresensi.html" class="b-nav-item"><i data-lucide="monitor-play"></i><span>Live</span></a>
        <a href="wilayah.html" class="b-nav-item"><i data-lucide="map"></i><span>Wilayah</span></a>
    </nav>

    <script>
        let currentTab = 'PEG';

        window.onload = async () => {
            lucide.createIcons(); initClock(); initTheme();
            await fetchAdminData();
        };

        async function fetchAdminData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
                const result = await res.json();
                if (result.status === 'success') {
                    window.appData = result; updateLogo();
                    if(document.getElementById('adminContent').style.display !== 'none') renderCards();
                }
            } catch (e) { console.error("Sync Failure"); }
        }

        function updateLogo() {
            const logo = window.appData.config.Logo || FALLBACK_LOGO;
            document.querySelectorAll('.main-logo-src').forEach(el => el.src = logo);
        }

        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            const adminPass = window.appData.config.AdminPassword || 'admin123';
            if(pass === adminPass) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderCards();
            } else { alert("🔴 Akses Ditolak!"); }
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-trigger').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + t).classList.add('active');
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('dataContainer');
            const data = currentTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            const query = document.getElementById('adminSearch').value.toLowerCase();
            
            const filtered = data.filter(p => 
                p.Nama.toLowerCase().includes(query) || 
                String(p.ID).toLowerCase().includes(query)
            );
            
            if(filtered.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.5; font-weight:800;">DATA TIDAK DITEMUKAN</div>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="admin-card fade-in">
                    <div class="avatar-area">
                        <div class="avatar-frame"></div>
                        <img src="${p.Link_Foto_Profile || ''}" class="avatar-box-img" onerror="this.src='https://placehold.co/100x135?text=?'">
                    </div>
                    <div class="card-info" style="align-self:center;">
                        <div class="staf-name">${p.Nama}</div>
                        <div class="staf-role">${p.Jabatan}</div>
                        <div class="staf-wil">WIL. ${p.Wilayah}</div>
                    </div>
                    <div class="card-qr-box">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${p.ID}" style="width:100%; height:100%;" alt="QR">
                    </div>
                    <div class="card-actions">
                        <button class="btn-act btn-reset" onclick="resetPresence('${p.ID}')"><i data-lucide="rotate-ccw" size="16"></i> RESET</button>
                        <button class="btn-act btn-edit" onclick="openEditModal('${p.ID}')"><i data-lucide="edit-3" size="16"></i> UBAH</button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function speechToText(id, btn) {
            if (!('webkitSpeechRecognition' in window)) { alert("Pencarian suara tidak didukung browser ini."); return; }
            const rec = new webkitSpeechRecognition(); rec.lang = 'id-ID';
            rec.onstart = () => btn.classList.add('listening');
            rec.onresult = (e) => { 
                document.getElementById(id).value = e.results[0][0].transcript; 
                renderCards(); 
            };
            rec.onend = () => btn.classList.remove('listening');
            rec.start();
        }

        function handleFileSelect(evt) {
            const file = evt.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { base64Photo = e.target.result; document.getElementById('formPreview').src = base64Photo; };
            reader.readAsDataURL(file);
        }

        function openEditModal(id) {
            const list = currentTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            const p = list.find(x => String(x.ID) === String(id));
            if(p) {
                document.getElementById('modalTitle').innerText = "EDIT DATA " + (currentTab === 'PEG' ? "PEGAWAI" : "KORLAP");
                document.getElementById('formID').value = p.ID;
                document.getElementById('formNama').value = p.Nama;
                document.getElementById('formJabatan').value = p.Jabatan;
                document.getElementById('formWilayah').value = p.Wilayah;
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                document.getElementById('formHP').value = p.NoHP || '';
                document.getElementById('formLokasi').value = p.Lokasi_Kerja || '';
                document.getElementById('formFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || 'https://placehold.co/100x135?text=?';
                base64Photo = "";
                document.getElementById('modalEditor').classList.add('active');
            }
        }

        function openAddModal() {
            document.getElementById('adminForm').reset();
            document.getElementById('modalTitle').innerText = "TAMBAH DATA BARU";
            document.getElementById('formPreview').src = 'https://placehold.co/100x135?text=?';
            base64Photo = "";
            document.getElementById('modalEditor').classList.add('active');
        }

        function closeModal() { document.getElementById('modalEditor').classList.remove('active'); }

        async function saveData() {
            const btn = document.getElementById('saveBtn'); if(btn) btn.disabled = true;
            const payload = { action: 'savePegawai', isKorlap: currentTab === 'WIL', ID: document.getElementById('formID').value, Nama: document.getElementById('formNama').value, Jabatan: document.getElementById('formJabatan').value, Wilayah: document.getElementById('formWilayah').value, NoHP: document.getElementById('formHP').value, Lokasi_Kerja: document.getElementById('formLokasi').value, Status: document.getElementById('formStatus').value, Link_Foto_Profile: document.getElementById('formFoto').value, fotoBase64: base64Photo };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                alert("✅ Data Berhasil Disinkronkan!");
                closeModal(); location.reload();
            } catch (e) { alert("🔴 Gagal Koneksi."); if(btn) btn.disabled = false; }
        }

        function resetPresence(id) { if(confirm("Hapus log presensi pegawai hari ini?")) alert("Perintah Reset dikirim..."); }

        function initClock() { setInterval(() => { const el = document.getElementById('clockSidebar'); if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000); }
        function initTheme() { if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme'); updateThemeIcons(localStorage.getItem('theme') === 'light'); }
        function toggleTheme() { const isLight = document.body.classList.toggle('light-theme'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); updateThemeIcons(isLight); }
        function updateThemeIcons(isLight) {
            const sI = document.getElementById('sidebarThemeIcon'), mI = document.getElementById('mobileThemeIcon'), lbl = document.getElementById('themeLabel');
            if (mI) mI.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            if (sI) sI.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            if (lbl) lbl.innerText = isLight ? "LIGHT MODE" : "DARK MODE";
            lucide.createIcons();
        }
    </script>
</body>
</html>
