<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel - SIM UPT PUSDA</title>
    
    <!-- Meta untuk Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Library Ikon Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link ke File CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <style>
        /* Modern UI Tweaks & Theme Adaptability */
        :root {
            --sidebar-width: 280px;
            --sidebar-z: 1000;
            --modal-z: 3000;
            --toggle-z: 1500;
            --bottom-nav-z: 2000;
            --transition-speed: 0.4s;
            --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        /* MODE TERANG PREMIUM - Kontras diperbaiki agar berkesan */
        body.light-theme {
            --bg-panel: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(30, 41, 59, 0.1);
            --text-main: #0f172a;
            --text-dim: #475569;
            --glass-border: rgba(30, 41, 59, 0.15);
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            --shadow-premium: 0 10px 30px rgba(0, 50, 150, 0.08);
            --input-bg: #ffffff;
            --tab-inactive: #e2e8f0;
        }

        /* MODE GELAP (Default) */
        body:not(.light-theme) {
            --bg-panel: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: rgba(248, 250, 252, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --shadow-premium: 0 30px 60px rgba(0, 0, 0, 0.4);
            --input-bg: rgba(0, 0, 0, 0.25);
            --tab-inactive: rgba(255, 255, 255, 0.05);
        }

        .hidden { display: none !important; }
        body { margin: 0; padding: 0; min-height: 100vh; }

        /* Bulatan Konsisten - Anti Lancip */
        .rounded-3xl { border-radius: var(--radius-xl) !important; }
        .rounded-2xl { border-radius: var(--radius-lg) !important; }
        .rounded-xl { border-radius: var(--radius-md) !important; }

        /* SIDEBAR FLOATING (Menyamakan dengan Index/Dashboard) */
        .sidebar {
            width: var(--sidebar-width);
            height: calc(100vh - 40px);
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: var(--sidebar-z);
            box-shadow: 0 20px 50px var(--card-shadow);
            transition: 0.3s;
        }

        .main-content {
            margin-left: calc(var(--sidebar-width) + 40px);
            padding: 40px 1.5rem 120px 0.5rem;
            transition: all var(--transition-speed) ease;
            min-height: 100vh;
        }

        /* Sidebar Footer (Jam & Tema) - Menyamakan dengan Index */
        .sidebar-footer {
            margin-top: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
        }
        body.light-theme .sidebar-footer { background: rgba(0, 0, 0, 0.03); }

        /* Login Area */
        #loginArea { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .login-card {
            max-width: 420px; width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-premium);
            padding: 50px 35px;
            text-align: center;
            border-radius: var(--radius-xl);
        }
        
        /* Kotak Password - Fix Tumpul Konsisten */
        .pass-input-wrapper { position: relative; margin-bottom: 25px; }
        .pass-input-wrapper input {
            text-align: center; font-weight: 800; font-size: 1.2rem;
            letter-spacing: 6px; padding: 18px !important;
            border: 2px solid var(--glass-border) !important;
            border-radius: 20px !important; 
            background: var(--input-bg) !important;
            color: var(--text-main) !important;
            width: 100%;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* GRID KARTU PEGAWAI - Responsif */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 22px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-premium);
            position: relative;
        }
        .admin-card:hover { transform: translateY(-8px); border-color: var(--accent); }

        /* Profile Card - Perbaikan Background & Status */
        .profile-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .card-img-wrapper {
            position: relative;
            width: 85px; height: 115px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            background: transparent; /* Fix: Background Transparan menyatu */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { flex: 1; min-width: 0; padding-top: 5px; }
        .card-name { font-weight: 800; font-size: 1.1rem; color: var(--text-main); margin-bottom: 2px; }
        .card-id { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; opacity: 0.7; }
        .card-role { 
            font-size: 0.8rem; font-weight: 800; color: var(--accent); 
            display: inline-block; padding: 4px 12px; background: rgba(249, 115, 22, 0.1);
            border-radius: 12px; margin-bottom: 10px;
        }

        .card-actions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--glass-border); padding-top: 15px; }
        .btn-action-small {
            flex: 1; padding: 12px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.7rem; font-weight: 800; cursor: pointer; transition: 0.2s;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-main);
        }
        .btn-action-small:hover { background: var(--accent-gradient); color: white; border-color: transparent; }

        /* Status Pill - Di bawah foto */
        .status-pill {
            padding: 5px 12px; border-radius: 10px;
            font-size: 0.6rem; font-weight: 900;
            text-align: center; width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-aktif { background: #10b981; color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .status-non { background: #ef4444; color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }

        /* Tab Navigation */
        .tab-nav { display: flex; gap: 12px; margin-bottom: 35px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .tab-trigger {
            background: var(--tab-inactive); border: 1px solid var(--glass-border);
            padding: 15px 28px; border-radius: 22px;
            font-weight: 800; font-size: 0.85rem; color: var(--text-dim);
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; white-space: nowrap;
        }
        .tab-trigger.active {
            background: var(--accent-gradient); color: white !important; border-color: transparent;
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.2); transform: translateY(-2px);
        }

        /* Modal Stacking */
        .modal-admin {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            z-index: var(--modal-z); display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-admin.show { display: flex; }
        .modal-card {
            background: var(--bg-panel); width: 100%; max-width: 550px;
            border-radius: 40px; border: 1px solid var(--glass-border);
            padding: 40px; max-height: 90vh; overflow-y: auto;
            box-shadow: var(--shadow-premium);
        }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 30px 0.5rem 140px 0.5rem; }
            .data-grid { grid-template-columns: 1fr; }
        }

        /* Bottom Nav Mobile */
        .bottom-nav {
            display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px;
            background: var(--sidebar-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 0 20px; justify-content: space-between; align-items: center;
            z-index: var(--bottom-nav-z); box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        @media (max-width: 1024px) { .bottom-nav { display: flex; } }
        
        .b-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.65rem; font-weight: 800; gap: 5px; }
        .b-nav-item.active { color: var(--accent); }
        .presensi-fab { background: var(--accent-gradient); padding: 14px; border-radius: 20px; margin-top: -45px; border: 5px solid var(--bg-panel); color: white; box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body class="dark-theme">

    <div class="fixed-bg"></div>

    <!-- TOGGLE THEME MOBILE -->
    <div class="theme-toggle-mobile rounded-2xl" onclick="toggleTheme()" style="width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; z-index: var(--toggle-z); background: var(--sidebar-bg); border: 1px solid var(--glass-border); box-shadow: var(--shadow-premium); cursor: pointer;">
        <i data-lucide="sun-moon"></i>
    </div>

    <!-- SIDEBAR (Senada Index) -->
    <aside class="sidebar" id="sidebarMenu">
        <div class="brand">
            <img src="https://z-cdn-media.chatglm.cn/files/0f622017-3978-4699-8e99-bfc963a4d2e9.png?auth_key=1867236411-acaa4dc359f04f54b59d66be1b739ee8-0-61299f9b6ef2dc1a86a21dccfe1cec7d" id="sidebarLogo" alt="Logo" onerror="this.src='https://placehold.co/100x100?text=PUSDA'">
            <div>
                <h1 style="color: var(--text-main); font-size: 1.1rem; font-weight: 800;">E-PUSDA</h1>
                <p style="color: var(--text-dim); font-size: 0.7rem; font-weight: 600;">UPT Bondoyudo Baru</p>
            </div>
        </div>

        <nav class="nav-items">
            <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="scan-face"></i> E-Presensi</a>
            <a href="wilayah.html" class="nav-link"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link active"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>

        <div class="sidebar-footer">
            <div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">Jam Server</div>
            <div id="clockSidebar" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; color: var(--accent); text-align: center;">00:00:00</div>
            <button class="btn btn-primary" onclick="toggleTheme()" style="width: 100%; padding: 10px; font-size: 0.8rem; border-radius: 12px; background: var(--accent-gradient); border:none; color:white; cursor:pointer;">
                <i data-lucide="sun-moon"></i> Ganti Tema
            </button>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
        
        <!-- AREA LOGIN -->
        <div id="loginArea" class="fade-in">
            <div class="login-card">
                <div style="width: 80px; height: 80px; background: rgba(249, 115, 22, 0.15); color: var(--accent); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                    <i data-lucide="lock" size="40"></i>
                </div>
                <h2 style="margin-bottom: 12px; font-weight: 800; font-size: 1.8rem; color: var(--text-main);">Akses Master</h2>
                <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 40px;">Gunakan sandi administrator untuk modifikasi data.</p>
                
                <div class="pass-input-wrapper">
                    <input type="password" id="pass" placeholder="••••••••">
                </div>
                
                <button class="btn-premium" onclick="login()" style="width: 100%; background: var(--accent-gradient); color: white; border-radius: 20px !important; cursor:pointer; font-weight:800; border:none; padding:18px;">
                    BUKA PANEL <i data-lucide="arrow-right" size="20"></i>
                </button>
            </div>
        </div>

        <!-- AREA DATA ADMIN -->
        <div id="adminContent" class="hidden">
            <div style="display: flex; flex-direction: column; gap: 30px; margin-bottom: 40px;">
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div style="width: 6px; height: 35px; background: var(--accent); border-radius: 3px;"></div>
                        <h2 style="font-weight: 800; font-size: 1.6rem; color: var(--text-main); letter-spacing: -0.8px;">Database Cloud</h2>
                    </div>
                    <button class="btn-premium" onclick="openAddModal()" style="background: var(--accent-gradient); color: white; font-size: 0.85rem; padding: 14px 24px; border-radius: 18px !important; border:none; cursor:pointer;">
                        <i data-lucide="user-plus" size="20"></i> TAMBAH DATA
                    </button>
                </div>

                <div class="tab-nav">
                    <div id="tabPeg" class="tab-trigger active" onclick="switchAdminTab('PEG')">
                        <i data-lucide="users" size="18"></i> DATA PEGAWAI
                    </div>
                    <div id="tabWil" class="tab-trigger" onclick="switchAdminTab('WIL')">
                        <i data-lucide="map-pin" size="18"></i> DATA KORLAP
                    </div>
                </div>
            </div>

            <!-- Kontainer Kartu Pegawai -->
            <div id="dataContainer" class="data-grid">
                <!-- Konten dirender oleh renderAdminTable() -->
            </div>
        </div>
    </main>

    <!-- MODAL EDITOR DATA -->
    <div id="modalEditor" class="modal-admin">
        <div class="modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 id="modalTitle" style="font-weight: 800; font-size: 1.5rem; color: var(--text-main);">Editor Informasi</h3>
                <div onclick="closeModalAdmin()" style="cursor: pointer; opacity: 0.5; padding: 5px;"><i data-lucide="x-circle" size="32"></i></div>
            </div>
            
            <form id="formAdmin" onsubmit="event.preventDefault(); saveAdminData();">
                <div style="display: flex; gap: 20px; margin-bottom: 30px; align-items: center; background: rgba(100, 150, 255, 0.05); padding: 25px; border-radius: 28px; border: 1px solid var(--glass-border);">
                    <img id="formPreview" src="https://placehold.co/100x130?text=User" style="width: 90px; height: 125px; border-radius: 18px; object-fit: cover; border: 2px solid white;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.65rem; font-weight: 800; color: var(--accent); display: block; margin-bottom: 12px;">FOTO PROFIL (PNG)</label>
                        <input type="file" id="fileFoto" accept="image/*" style="display: none;" onchange="handleAdminPhoto(this)">
                        <button type="button" class="btn-premium" onclick="document.getElementById('fileFoto').click()" style="background: var(--primary); color: white; width: 100%; font-size: 0.8rem; padding: 12px; border-radius: 14px !important; border:none; cursor:pointer;">
                            <i data-lucide="upload" size="18"></i> GANTI FOTO
                        </button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div class="input-group">
                        <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">ID SISTEM</label>
                        <input type="text" id="formID" required>
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">STATUS</label>
                        <select id="formStatus">
                            <option value="Aktif">Aktif</option>
                            <option value="Non-Aktif">Non-Aktif</option>
                        </select>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 20px;">
                    <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">NAMA LENGKAP</label>
                    <input type="text" id="formNama" placeholder="Nama tanpa gelar" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div class="input-group">
                        <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">JABATAN</label>
                        <input type="text" id="formJabatan" required>
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">WILAYAH</label>
                        <select id="formWilayah">
                            <option value="Bangorejo">Bangorejo</option>
                            <option value="Cluring">Cluring</option>
                            <option value="Pesanggaran">Pesanggaran</option>
                            <option value="Porolinggo">Porolinggo</option>
                            <option value="Umum">Umum</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">WHATSAPP</label>
                        <input type="text" id="formHP" placeholder="08xxxxx">
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 8px;">KOORDINAT</label>
                        <input type="text" id="formLokasi" placeholder="Lokasi GPS">
                    </div>
                </div>

                <div style="margin-top: 40px; display: flex; gap: 15px;">
                    <button type="button" class="btn-premium" onclick="closeModalAdmin()" style="flex: 1; background: rgba(0,0,0,0.05); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 18px !important; cursor:pointer;">BATAL</button>
                    <button type="submit" class="btn-premium" style="flex: 2; background: var(--accent-gradient); color: white; border-radius: 18px !important; border:none; cursor:pointer; font-weight:800;">
                        SIMPAN PERUBAHAN <i data-lucide="save" size="20"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav">
        <a href="index.html" class="b-nav-item"><i data-lucide="home"></i><span>Home</span></a>
        <a href="raport.html" class="b-nav-item"><i data-lucide="file-text"></i><span>Raport</span></a>
        <a href="presensi.html" class="b-nav-item"><div class="presensi-fab"><i data-lucide="scan-face"></i></div></a>
        <a href="wilayah.html" class="b-nav-item"><i data-lucide="map"></i><span>Wilayah</span></a>
        <a href="admin.html" class="b-nav-item active"><i data-lucide="user-cog"></i><span>Admin</span></a>
    </nav>

    <!-- SCRIPTS -->
    <script src="assets/js/main.js"></script>
    <script>
        let currentAdminTab = 'PEG';

        function switchAdminTab(type) {
            currentAdminTab = type;
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            const targetId = type === 'PEG' ? 'tabPeg' : 'tabWil';
            const targetEl = document.getElementById(targetId);
            if(targetEl) targetEl.classList.add('active');
            renderAdminTable();
        }

        /**
         * Render Kartu Data - Sinkron dengan main.js
         */
        function renderAdminTable() {
            const container = document.getElementById('dataContainer');
            if (!container) return;
            
            if (!window.appData || !window.appData.isLoaded) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:120px 20px; opacity:0.5;"><i data-lucide="loader-2" class="spin" size="40"></i><br><br>Menghubungkan ke Database...</div>`;
                lucide.createIcons();
                return;
            }

            const data = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            
            if (!data || data.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:120px 20px; color:var(--text-dim);"><i data-lucide="database" size="40" style="margin-bottom:15px; opacity:0.3;"></i><br>Tidak ada data di tabel ${currentAdminTab}.</div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="admin-card">
                    <div class="profile-col">
                        <div class="card-img-wrapper">
                            <img src="${p.Link_Foto_Profile || 'https://placehold.co/80x110?text=?'}" 
                                 class="card-img" 
                                 onerror="this.src='https://placehold.co/80x110?text=Error'">
                        </div>
                        <span class="status-pill ${p.Status === 'Aktif' ? 'status-aktif' : 'status-non'}">
                            ${p.Status || 'Aktif'}
                        </span>
                    </div>
                    <div class="card-info">
                        <div class="card-name">${p.Nama}</div>
                        <div class="card-id">ID: #${p.ID}</div>
                        <div class="card-role">${p.Jabatan}</div>
                        <div class="card-region">
                            <i data-lucide="map-pin" size="10"></i>
                            WIL. ${p.Wilayah?.toUpperCase() || '-'}
                        </div>
                        <div class="card-actions">
                            <button type="button" class="btn-action-small" onclick="resetTodayPresence('${p.ID}')" title="Reset Presensi">
                                <i data-lucide="rotate-ccw" size="14"></i> RESET
                            </button>
                            <button type="button" class="btn-action-small" onclick="editData('${p.ID}')" title="Ubah Data">
                                <i data-lucide="edit-3" size="14"></i> UBAH
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Monitoring sinkronisasi data
        const checkDataSync = setInterval(() => {
            if(window.appData && window.appData.isLoaded) {
                renderAdminTable();
                clearInterval(checkDataSync);
            }
        }, 800);

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
            document.getElementById('formAdmin').reset();
            document.getElementById('formPreview').src = "https://placehold.co/100x130?text=BARU";
            document.getElementById('modalEditor').classList.add('show');
            lucide.createIcons();
        }

        /**
         * Fungsi Edit Data - Fix: Tombol Ubah agar Berfungsi
         */
        function editData(id) {
            const list = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            // Gunakan toString() untuk perbandingan yang aman (JS ID bisa number/string)
            const p = list.find(x => x.ID.toString() === id.toString());
            
            if (p) {
                document.getElementById('modalTitle').innerText = "Edit Info " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
                document.getElementById('formID').value = p.ID || '';
                document.getElementById('formNama').value = p.Nama || '';
                document.getElementById('formJabatan').value = p.Jabatan || '';
                document.getElementById('formWilayah').value = p.Wilayah || '';
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                // Menghapus tanda kutip tampilan jika ada (fix untuk leading zero)
                document.getElementById('formHP').value = p.NoHP ? p.NoHP.toString().replace(/^'/, '') : '';
                document.getElementById('formLokasi').value = p.Lokasi_Kerja || '';
                document.getElementById('formLinkFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || "https://placehold.co/100x130?text=USER";
                document.getElementById('modalEditor').classList.add('show');
                lucide.createIcons();
            } else {
                console.error("Data tidak ditemukan untuk ID:", id);
            }
        }

        function closeModalAdmin() { document.getElementById('modalEditor').classList.remove('show'); }

        function handleAdminPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('formPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function initClock() {
            const el = document.getElementById('clockSidebar');
            if (el) setInterval(() => { el.innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        }
        initClock();
    </script>
</body>
</html>
