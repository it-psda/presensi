<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel - SIM UPT PUSDA</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .hidden { display: none !important; }
        .rounded-xl { border-radius: 16px !important; }
        .rounded-2xl { border-radius: 24px !important; }
        .rounded-3xl { border-radius: 32px !important; }
        input, select, textarea { border-radius: 16px !important; }
        .tab-btn { padding: 14px 28px; border-radius: 20px; cursor: pointer; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-muted); font-weight: 700; font-size: 0.85rem; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        .modal-admin { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-admin.show { display: flex; }
        .modal-content-admin { background: var(--bg-body); width: 100%; max-width: 600px; border-radius: 32px; border: 1px solid var(--glass-border); padding: 35px; max-height: 90vh; overflow-y: auto; position: relative; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 5px; opacity: 0.7; text-transform: uppercase; }
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 32px; background: var(--glass); border: 1px solid var(--glass-border); box-shadow: 0 20px 40px var(--card-shadow); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: rgba(0,0,0,0.2); padding: 22px 20px; font-size: 0.75rem; text-align: left; opacity: 0.6; }
        td { padding: 18px 20px; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }
        .action-btn-group { display: flex; gap: 8px; }
        .action-btn { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="fixed-bg"></div>
    <div class="theme-toggle-mobile rounded-2xl" onclick="toggleTheme()"><i data-lucide="sun-moon"></i></div>

    <aside class="sidebar">
        <div class="brand"><img src="" id="sidebarLogo" alt="Logo"><div><h1>E-PUSDA</h1><p>Bondoyudo Baru</p></div></div>
        <nav class="nav-items">
            <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="scan-face"></i> E-Presensi</a>
            <a href="wilayah.html" class="nav-link"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link active"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>
        <div class="sidebar-footer rounded-3xl">
            <div id="clockSidebar" style="font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; text-align: center;">00:00:00</div>
            <button class="btn btn-primary rounded-2xl" onclick="toggleTheme()" style="width: 100%; padding: 12px; font-weight: 800;"><i data-lucide="sun-moon" size="18"></i> TEMA</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="loginArea" class="fade-in" style="max-width: 420px; margin: 100px auto 0;">
            <div class="rounded-3xl" style="background: var(--glass); padding: 45px; border: 1px solid var(--glass-border); backdrop-filter: blur(25px); text-align: center;">
                <div style="width: 70px; height: 70px; background: rgba(249, 115, 22, 0.1); color: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;"><i data-lucide="lock" size="32"></i></div>
                <h2 style="margin-bottom: 10px; font-weight: 800; font-size: 1.5rem;">Sistem Administrator</h2>
                <input type="password" id="pass" placeholder="••••••••" style="text-align: center; font-size: 1.2rem; letter-spacing: 5px; padding: 18px; margin-bottom: 25px;">
                <button class="btn btn-primary rounded-2xl" onclick="login()" style="width: 100%; padding: 18px; font-weight: 800;">MASUK PANEL <i data-lucide="arrow-right" size="18" style="margin-left: 8px;"></i></button>
            </div>
        </div>

        <div id="adminContent" class="hidden">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px;">
                <h2 style="font-weight: 800;">Manajemen Data</h2>
                <button class="btn btn-primary rounded-xl" onclick="openAddModal()" style="padding: 12px 20px;"><i data-lucide="plus" size="18"></i> TAMBAH DATA</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <div id="tabPeg" class="tab-btn active" onclick="switchAdminTab('PEG')">PEGAWAI</div>
                <div id="tabWil" class="tab-btn" onclick="switchAdminTab('WIL')">KORLAP</div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>ID</th><th>FOTO</th><th>NAMA</th><th>JABATAN</th><th>STATUS</th><th style="text-align: center;">KONTROL</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalEditor" class="modal-admin">
        <div class="modal-content-admin rounded-3xl">
            <h3 id="modalTitle" style="margin-bottom: 25px;">Editor Data</h3>
            <form id="formAdmin" onsubmit="event.preventDefault(); saveAdminData();">
                <div style="display: flex; gap: 20px; margin-bottom: 25px; align-items: center; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px;">
                    <img id="formPreview" src="https://placehold.co/100x130?text=User" style="width: 80px; height: 105px; border-radius: 12px; object-fit: cover;">
                    <div style="flex: 1;">
                        <label>Foto Profil</label>
                        <input type="text" id="formLinkFoto" placeholder="https://..." style="margin-bottom: 10px; font-size: 0.8rem;">
                        <input type="file" id="fileFoto" accept="image/*" style="display: none;" onchange="handleAdminPhoto(this)">
                        <button type="button" class="btn" onclick="document.getElementById('fileFoto').click()" style="background: var(--primary); color: white; width: 100%; font-size: 0.75rem; padding: 8px;"><i data-lucide="upload-cloud" size="14"></i> UPLOAD PNG</button>
                    </div>
                </div>
                <div class="form-grid">
                    <div><label>ID Sistem</label><input type="text" id="formID" required></div>
                    <div><label>Status</label><select id="formStatus"><option value="Aktif">Aktif</option><option value="Non-Aktif">Non-Aktif</option></select></div>
                    <div style="grid-column: span 2;"><label>Nama Lengkap</label><input type="text" id="formNama" required></div>
                    <div><label>Jabatan</label><input type="text" id="formJabatan" required></div>
                    <div><label>Wilayah</label><select id="formWilayah"><option value="Bangorejo">Bangorejo</option><option value="Cluring">Cluring</option><option value="Pesanggaran">Pesanggaran</option><option value="Porolinggo">Porolinggo</option><option value="Umum">Umum</option></select></div>
                    <!-- INPUT YANG SEBELUMNYA HILANG DAN MENYEBABKAN ERROR -->
                    <div><label>No. HP (628...)</label><input type="text" id="formHP" placeholder="628xxxx"></div>
                    <div><label>Titik Koordinat</label><input type="text" id="formLokasi" placeholder="-8.xxx, 114.xxx"></div>
                </div>
                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button type="button" class="btn" onclick="closeModalAdmin()" style="flex: 1; background: rgba(255,255,255,0.05); color: white;">BATAL</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">SIMPAN PERUBAHAN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        let currentAdminTab = 'PEG';
        function switchAdminTab(type) {
            currentAdminTab = type;
            document.getElementById('tabPeg').classList.toggle('active', type === 'PEG');
            document.getElementById('tabWil').classList.toggle('active', type === 'WIL');
            renderAdminTable();
        }
        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
            document.getElementById('formAdmin').reset();
            document.getElementById('formPreview').src = "https://placehold.co/100x130?text=User";
            document.getElementById('modalEditor').classList.add('show');
        }
        function editData(id) {
            const list = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            const p = list.find(x => x.ID == id);
            if (p) {
                document.getElementById('modalTitle').innerText = "Edit " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
                document.getElementById('formID').value = p.ID || '';
                document.getElementById('formNama').value = p.Nama || '';
                document.getElementById('formJabatan').value = p.Jabatan || '';
                document.getElementById('formWilayah').value = p.Wilayah || '';
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                document.getElementById('formHP').value = p.NoHP || '';
                document.getElementById('formLokasi').value = p.Lokasi_Kerja || '';
                document.getElementById('formLinkFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || "https://placehold.co/100x130?text=User";
                document.getElementById('modalEditor').classList.add('show');
            }
        }
        function closeModalAdmin() { document.getElementById('modalEditor').classList.remove('show'); }
        function handleAdminPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('formPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
