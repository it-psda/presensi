        :root {

            --toska: #06b6d4; --pink: #f472b6; --purple: #a855f7;
            --bg-body: #0f172a; --bg-gradient: radial-gradient(circle at top right, #1e40af, #0f172a 60%);

        body.light-theme {
            --bg-body: #f1f5f9; --bg-gradient: radial-gradient(circle at top right, #dbeafe, #f1f5f9 70%);

        .sidebar-footer { margin-top: auto; padding: 18px; background: rgba(255, 255, 255, 0.04); border-radius: 20px; text-align: center; }

        .theme-btn { width: 100%; padding: 12px; border-radius: 12px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        /* --- MAIN CONTENT area --- */

        /* --- THEME TOGGLE MOBILE (FIXED) --- */

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .login-input-group input { width: 100%; padding: 22px 30px; border-radius: 24px; background: rgba(0,0,0,0.4); border: 1.5px solid var(--glass-border); color: white; font-weight: 800; text-align: center; font-size: 1.1rem; letter-spacing: 5px; outline: none; margin-bottom: 25px; }

        /* --- CONTROL CENTER TAB NAV --- */
        .tab-nav { display: flex; gap: 10px; margin-bottom: 35px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 22px; border: 1px solid var(--glass-border); }
        .tab-trigger { 
            flex: 1; padding: 14px; text-align: center; border-radius: 16px;

        .tab-trigger.active { 
            background: linear-gradient(135deg, var(--primary), var(--primary-light)); 
            color: white; border-color: var(--primary-light); 
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3);

        .card-qr-box { width: 75px; height: 75px; background: white; border-radius: 18px; padding: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .card-actions { grid-column: span 3; display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--glass-border); padding-top: 15px; }
        .btn-act { flex: 1; padding: 12px; border-radius: 15px; border: none; font-weight: 900; font-size: 0.65rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .btn-edit { background: var(--primary-light); color: white; }
        .btn-reset { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1.5px solid var(--glass-border); }

        /* --- MODAL EDITOR --- */
        .modal-overlay { position: fixed; inset: 0; z-index: 5000; display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .glass-modal-card { background: var(--glass); border: 1px solid var(--glass-border); width: 100%; max-width: 700px; border-radius: 45px; padding: 40px; color: white; animation: modalPop 0.5s ease; position: relative; }
        @keyframes modalPop { from { transform: scale(0.9) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .preview-box { width: 90px; height: 120px; border-radius: 20px; overflow: hidden; background: #000; border: 2.5px solid white; flex-shrink: 0; }
        input, select { width: 100%; padding: 15px 20px; border-radius: 18px; background: rgba(0,0,0,0.35); border: 1.5px solid var(--glass-border); color: white; font-weight: 700; outline: none; transition: 0.3s; }

        /* --- MOBILE PROTECTION & REFINEMENT --- */
        @media (min-width: 1025px) { 
            .bottom-nav, .theme-toggle-mobile { display: none !important; } 
        }

        @media (max-width: 1024px) {
            #master-sidebar { display: none; }
            #main-content { margin-left: 0; padding: 25px 0.8rem 130px 0.8rem; }
            .data-grid { grid-template-columns: 1fr; }
            .theme-toggle-mobile { display: flex; }
            .bottom-nav { display: flex !important; position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: rgba(15, 23, 42, 0.95); border-radius: 22px; justify-content: space-around; align-items: center; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

            .header-box h2 { font-size: 1.6rem; }
            .btn-add { font-size: 0.65rem; padding: 10px 15px; }
        }
    </style>

        <div class="presensi-fab" onclick="location.href='presensi.html'"><i data-lucide="scan-face" color="white" size="30"></i></div>
        <a href="wilayah.html" class="nav-item"><i data-lucide="map"></i><span>Wilayah</span></a>
        <a href="admin.html" class="nav-item active"><i data-lucide="user-cog"></i><span>Admin</span></a>
    </nav>

    <script>
        let currentTab = 'PEG';

        window.onload = async () => {
            lucide.createIcons(); initClock(); initTheme();
            await fetchAdminData();
        };

        async function fetchAdminData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const result = await res.json();
                if (result.status === 'success') {
                    window.appData = result;
                    updateLogo();
                    if(document.getElementById('adminContent').style.display !== 'none') renderCards();
                }
            } catch (e) { console.error("Sync Failure"); }
        }

        function updateLogo() {
            const logo = window.appData.config.Logo || FALLBACK_LOGO;
            document.querySelectorAll('.main-logo-src').forEach(el => el.src = logo);
        }

        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            const adminPass = window.appData.config.AdminPassword || 'admin123';
            if(pass === adminPass) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderCards();
            } else { alert("🔴 Akses Ditolak!"); }
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-trigger').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + t).classList.add('active');
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('dataContainer');
            const data = currentTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            
            container.innerHTML = data.map(p => `
                <div class="admin-card fade-in">
                    <div class="card-avatar-container">
                        <div class="avatar-frame"></div>
                        <img src="${p.Link_Foto_Profile || ''}" class="avatar-img" onerror="this.src='https://placehold.co/100x130?text=?'">
                    </div>
                    <div class="card-info">
                        <div class="staf-name">${p.Nama}</div>
                        <div class="staf-wil">WIL. ${p.Wilayah}</div>
                    </div>
                    <div class="card-qr-box">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${p.ID}" style="width:100%; height:100%;">
                    </div>
                    <div class="card-actions">
                        <button class="btn-act btn-reset" onclick="resetPresence('${p.ID}')"><i data-lucide="rotate-ccw" size="14"></i> RESET</button>
                        <button class="btn-act btn-edit" onclick="openEditModal('${p.ID}')"><i data-lucide="edit-3" size="14"></i> UBAH</button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function handleFileSelect(evt) {
            const file = evt.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { base64Photo = e.target.result; document.getElementById('formPreview').src = base64Photo; };
            reader.readAsDataURL(file);
        }

        function openEditModal(id) {
            const list = currentTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            const p = list.find(x => String(x.ID) === String(id));
            if(p) {
                document.getElementById('modalTitle').innerText = "EDIT " + (currentTab === 'PEG' ? "PEGAWAI" : "KORLAP");
                document.getElementById('formID').value = p.ID;
                document.getElementById('formNama').value = p.Nama;
                document.getElementById('formJabatan').value = p.Jabatan;
                document.getElementById('formWilayah').value = p.Wilayah;
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                document.getElementById('formHP').value = p.NoHP || '';
                document.getElementById('formLokasi').value = p.Lokasi_Kerja || '';
                document.getElementById('formFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || 'https://placehold.co/100x130?text=?';
                base64Photo = "";
                document.getElementById('modalEditor').classList.add('active');
            }
        }

        function openAddModal() {
            document.getElementById('adminForm').reset();
            document.getElementById('modalTitle').innerText = "TAMBAH DATA BARU";
            document.getElementById('formPreview').src = 'https://placehold.co/100x130?text=?';
            base64Photo = "";
            document.getElementById('modalEditor').classList.add('active');
        }

        function closeModal() { document.getElementById('modalEditor').classList.remove('active'); }

        async function saveData() {
            const btn = document.getElementById('saveBtn'); if(btn) btn.disabled = true;
            const payload = { action: 'savePegawai', isKorlap: currentTab === 'WIL', ID: document.getElementById('formID').value, Nama: document.getElementById('formNama').value, Jabatan: document.getElementById('formJabatan').value, Wilayah: document.getElementById('formWilayah').value, NoHP: document.getElementById('formHP').value, Lokasi_Kerja: document.getElementById('formLokasi').value, Status: document.getElementById('formStatus').value, Link_Foto_Profile: document.getElementById('formFoto').value, fotoBase64: base64Photo };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                alert("✅ Data Berhasil Disinkronkan!");
                closeModal(); location.reload();
            } catch (e) { alert("🔴 Gagal Koneksi."); if(btn) btn.disabled = false; }
        }

        function resetPresence(id) { if(confirm("Reset log presensi?")) alert("Perintah dikirim..."); }
        function initClock() { setInterval(() => { const el = document.getElementById('clockSidebar'); if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000); }
        
        function initTheme() { 
            const isLight = localStorage.getItem('theme') === 'light'; 
            if(isLight) document.body.classList.add('light-theme'); 
            updateThemeIcons(isLight); 
        }

        function toggleTheme() { 
            const isLight = document.body.classList.toggle('light-theme'); 
            localStorage.setItem('theme', isLight ? 'light' : 'dark'); 
            updateThemeIcons(isLight); 
        }

        function updateThemeIcons(isLight) {
            const sidebarBtn = document.getElementById('themeBtn');
            const mobileIcon = document.getElementById('mobileThemeIcon');
            if (sidebarBtn) sidebarBtn.innerText = isLight ? "Light Mode" : "Dark Mode";
            if (mobileIcon) mobileIcon.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            lucide.createIcons();
        }
    </script>
</body>
</html>
