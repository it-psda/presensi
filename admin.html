<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel - SIM UPT PUSDA</title>
    
    <!-- Meta untuk Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Library Ikon Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link ke File CSS Eksternal -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <style>
        /* Global UI Consistency */
        .hidden { display: none !important; }
        .rounded-xl { border-radius: 16px !important; }
        .rounded-2xl { border-radius: 24px !important; }
        .rounded-3xl { border-radius: 32px !important; }
        
        input, select, textarea { border-radius: 16px !important; }

        /* Tab Style */
        .tab-btn { 
            padding: 14px 28px; border-radius: 20px; cursor: pointer; 
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); 
            color: var(--text-muted); font-weight: 700; font-size: 0.85rem; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; 
        }
        .tab-btn.active { 
            background: var(--accent); color: white; border-color: var(--accent); 
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); 
        }
        
        /* Modal Admin Style */
        .modal-admin { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); z-index: 2000; display: none; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-admin.show { display: flex; animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content-admin { 
            background: var(--bg-body); width: 100%; max-width: 600px; 
            border-radius: 32px; border: 1px solid var(--glass-border); 
            padding: 35px; max-height: 90vh; overflow-y: auto; position: relative; 
        }
        
        /* Form Grid */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 5px; opacity: 0.7; text-transform: uppercase; }
        
        /* Table Responsive */
        .table-wrapper { 
            width: 100%; overflow-x: auto; border-radius: 32px; 
            background: var(--glass); border: 1px solid var(--glass-border); 
            box-shadow: 0 20px 40px var(--card-shadow); margin-bottom: 25px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: rgba(0,0,0,0.2); padding: 22px 20px; font-size: 0.75rem; text-align: left; opacity: 0.6; }
        td { padding: 18px 20px; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }

        .action-btn-group { display: flex; gap: 8px; justify-content: center; }
        .action-btn { 
            width: 38px; height: 38px; border-radius: 12px; display: flex; 
            align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s;
        }

        @media (max-width: 768px) {
            .main-content { padding: 30px 15px 120px; }
            .modal-content-admin { padding: 25px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>

    <div class="theme-toggle-mobile rounded-2xl" onclick="toggleTheme()">
        <i data-lucide="sun-moon"></i>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <img src="" id="sidebarLogo" alt="Logo">
            <div>
                <h1>E-PUSDA</h1>
                <p>Bondoyudo Baru</p>
            </div>
        </div>

        <nav class="nav-items">
            <a href="index.html" class="nav-link">
                <i data-lucide="layout-grid"></i> Dashboard
            </a>
            <a href="raport.html" class="nav-link">
                <i data-lucide="file-bar-chart"></i> E-Raport
            </a>
            <a href="presensi.html" class="nav-link">
                <i data-lucide="scan-face"></i> E-Presensi
            </a>
            <a href="wilayah.html" class="nav-link">
                <i data-lucide="map"></i> Wilayah
            </a>
            <a href="admin.html" class="nav-link active">
                <i data-lucide="shield-check"></i> Admin Panel
            </a>
        </nav>

        <div class="sidebar-footer rounded-3xl">
            <div id="clockSidebar" style="font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; text-align: center;">00:00:00</div>
            <button class="btn btn-primary rounded-2xl" onclick="toggleTheme()" style="width: 100%; padding: 12px; font-weight: 800;">
                <i data-lucide="sun-moon" size="18"></i> TEMA
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- LOGIN AREA -->
        <div id="loginArea" class="fade-in" style="max-width: 420px; margin: 100px auto 0;">
            <div class="rounded-3xl" style="background: var(--glass); padding: 45px; border: 1px solid var(--glass-border); backdrop-filter: blur(25px); text-align: center;">
                <div style="width: 70px; height: 70px; background: rgba(249, 115, 22, 0.1); color: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                    <i data-lucide="lock" size="32"></i>
                </div>
                <h2 style="margin-bottom: 10px; font-weight: 800; font-size: 1.5rem;">Sistem Administrator</h2>
                <p style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 35px;">Gunakan kata sandi Master untuk masuk.</p>
                <input type="password" id="pass" placeholder="••••••••" style="text-align: center; font-size: 1.2rem; letter-spacing: 5px; padding: 18px; margin-bottom: 25px;">
                <button class="btn btn-primary rounded-2xl" onclick="login()" style="width: 100%; padding: 18px; font-weight: 800;">
                    MASUK PANEL <i data-lucide="arrow-right" size="18" style="margin-left: 8px;"></i>
                </button>
            </div>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="adminContent" class="hidden">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="width: 6px; height: 26px; background: var(--accent); border-radius: 3px;"></div>
                    <span style="font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;">Manajemen Data Cloud</span>
                </div>
                <button class="btn btn-primary rounded-xl" onclick="openAddModal()" style="padding: 12px 20px; font-size: 0.85rem;">
                    <i data-lucide="plus" size="18"></i> TAMBAH DATA
                </button>
            </div>

            <!-- Tab Switcher -->
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <div id="tabPeg" class="tab-btn active" onclick="switchAdminTab('PEG')">PEGAWAI (MS_PEG)</div>
                <div id="tabWil" class="tab-btn" onclick="switchAdminTab('WIL')">KORLAP (MS_WIL)</div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID SISTEM</th>
                            <th>FOTO</th>
                            <th>NAMA LENGKAP</th>
                            <th>JABATAN / WILAYAH</th>
                            <th>STATUS</th>
                            <th style="text-align: center;">KONTROL DATA</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL EDITOR -->
    <div id="modalEditor" class="modal-admin">
        <div class="modal-content-admin rounded-3xl">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 id="modalTitle" style="font-weight: 800; font-size: 1.3rem;">Editor Database</h3>
                <div onclick="closeModalAdmin()" style="cursor: pointer; opacity: 0.5;"><i data-lucide="x"></i></div>
            </div>
            
            <form id="formAdmin" onsubmit="event.preventDefault(); saveAdminData();">
                <div style="display: flex; gap: 20px; margin-bottom: 25px; align-items: center; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px;">
                    <img id="formPreview" src="https://placehold.co/100x130?text=User" style="width: 80px; height: 105px; border-radius: 12px; object-fit: cover;">
                    <div style="flex: 1;">
                        <label>Tautan / Upload Foto Profil</label>
                        <input type="text" id="formLinkFoto" placeholder="https://..." style="margin-bottom: 10px; font-size: 0.8rem;">
                        <input type="file" id="fileFoto" accept="image/*" style="display: none;" onchange="handleAdminPhoto(this)">
                        <button type="button" class="btn" onclick="document.getElementById('fileFoto').click()" style="background: var(--primary); color: white; width: 100%; font-size: 0.75rem; padding: 8px;">
                            <i data-lucide="upload-cloud" size="14"></i> GANTI FOTO PNG
                        </button>
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label>ID Sistem</label>
                        <input type="text" id="formID" required>
                    </div>
                    <div>
                        <label>Status Kerja</label>
                        <select id="formStatus">
                            <option value="Aktif">Aktif</option>
                            <option value="Non-Aktif">Non-Aktif</option>
                        </select>
                    </div>
                    <div style="grid-column: span 2;">
                        <label>Nama Lengkap</label>
                        <input type="text" id="formNama" required>
                    </div>
                    <div>
                        <label>Jabatan</label>
                        <input type="text" id="formJabatan" required>
                    </div>
                    <div>
                        <label>Wilayah</label>
                        <select id="formWilayah">
                            <option value="Bangorejo">Bangorejo</option>
                            <option value="Cluring">Cluring</option>
                            <option value="Pesanggaran">Pesanggaran</option>
                            <option value="Porolinggo">Porolinggo</option>
                            <option value="Umum">Umum</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button type="button" class="btn" onclick="closeModalAdmin()" style="flex: 1; background: rgba(255,255,255,0.05); color: white;">BATAL</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2; padding: 15px;">SIMPAN PERUBAHAN</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="assets/js/main.js"></script>
    <script>
        let currentAdminTab = 'PEG';

        function switchAdminTab(type) {
            currentAdminTab = type;
            document.getElementById('tabPeg').classList.toggle('active', type === 'PEG');
            document.getElementById('tabWil').classList.toggle('active', type === 'WIL');
            renderAdminTable();
        }

        function renderAdminTable() {
            const container = document.getElementById('tableBody');
            if (!window.appData.isLoaded) {
                container.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5;">Sinkronisasi...</td></tr>`;
                return;
            }

            const data = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            
            if (!data.length) {
                container.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5;">Kosong.</td></tr>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <tr>
                    <td style="font-weight:800; font-size:0.8rem; opacity:0.5;">#${p.ID}</td>
                    <td><img src="${p.Link_Foto_Profile}" style="width:40px; height:55px; border-radius:8px; object-fit:cover; border:1px solid var(--glass-border);"></td>
                    <td><div style="font-weight:800; font-size:0.95rem;">${p.Nama}</div></td>
                    <td><div style="font-size:0.85rem; font-weight:700; color:var(--accent);">${p.Jabatan}</div><div style="font-size:0.7rem; opacity:0.6;">WIL. ${p.Wilayah}</div></td>
                    <td><span style="background:${p.Status === 'Aktif' ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'}; color:${p.Status === 'Aktif' ? 'var(--success)' : 'var(--danger)'}; padding:6px 12px; border-radius:10px; font-size:0.7rem; font-weight:800;">${p.Status}</span></td>
                    <td>
                        <div class="action-btn-group">
                            <button class="action-btn" title="Reset Absen Hari Ini" onclick="resetTodayPresence('${p.ID}')" style="background:rgba(245,158,11,0.15); color:#f59e0b;">
                                <i data-lucide="rotate-ccw" size="18"></i>
                            </button>
                            <button class="action-btn" title="Edit Data" onclick="editData('${p.ID}')" style="background:rgba(59,130,246,0.15); color:#3b82f6;">
                                <i data-lucide="edit-3" size="18"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
            document.getElementById('formAdmin').reset();
            document.getElementById('formPreview').src = "https://placehold.co/100x130?text=User";
            document.getElementById('modalEditor').classList.add('show');
        }

        function editData(id) {
            const list = currentAdminTab === 'PEG' ? window.appData.pegawai : window.appData.korlap;
            const p = list.find(x => x.ID == id);
            if (p) {
                document.getElementById('modalTitle').innerText = "Edit " + (currentAdminTab === 'PEG' ? "Pegawai" : "Korlap");
                document.getElementById('formID').value = p.ID;
                document.getElementById('formNama').value = p.Nama;
                document.getElementById('formJabatan').value = p.Jabatan;
                document.getElementById('formWilayah').value = p.Wilayah;
                document.getElementById('formStatus').value = p.Status || 'Aktif';
                document.getElementById('formLinkFoto').value = p.Link_Foto_Profile || '';
                document.getElementById('formPreview').src = p.Link_Foto_Profile || "https://placehold.co/100x130?text=User";
                document.getElementById('modalEditor').classList.add('show');
            }
        }

        function closeModalAdmin() { document.getElementById('modalEditor').classList.remove('show'); }

        function handleAdminPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('formPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
